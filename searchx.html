<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Gesture Controller</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { margin: 0; background: #080808; color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* Floating Control UI */
        .m-panel {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95); padding: 15px 30px;
            border-radius: 50px; border: 1px solid #00c8ff; z-index: 9999;
            text-align: center; box-shadow: 0 0 20px rgba(0,200,255,0.4);
        }

        .toggle-btn {
            padding: 10px 25px; border-radius: 30px; border: none;
            font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .active { background: #00ff88; color: #000; }
        .inactive { background: #ff4444; color: #fff; }

        /* Hidden Video for tracking */
        #video-preview {
            position: fixed; bottom: 20px; right: 20px;
            width: 130px; height: 100px; border: 2px solid #333;
            border-radius: 10px; overflow: hidden; transform: scaleX(-1);
            background: #000; z-index: 100;
        }

        .scroll-content { padding: 120px 20px; height: 4000px; text-align: center; }
        .box { height: 300px; background: #111; margin: 20px 0; border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="m-panel">
        <div style="margin-bottom: 8px; font-size: 12px; letter-spacing: 2px;">M-GESTURE SYSTEM</div>
        <button id="sysBtn" class="toggle-btn inactive" onclick="toggleMSystem()">SYSTEM: OFF</button>
    </div>

    <div id="video-preview">
        <video id="webcam" autoplay playsinline style="width:100%; height:100%; object-fit: cover;"></video>
    </div>

    <div class="scroll-content">
        <h1>Bina Touch kiye Scroll karein</h1>
        <p>1. Camera Allow karein aur ON karein.</p>
        <p>2. Hath ko camera ke samne 2-3 feet dur rakhein.</p>
        <div class="box" style="color: #00c8ff;">HATH UPAR = NEECHE JAYEGA</div>
        <div class="box" style="color: #ff00ff;">HATH NEECHE = UPAR JAYEGA</div>
        <div class="box">Testing Item 3</div>
        <div class="box">Testing Item 4</div>
    </div>

<script>
    let isLive = false;
    const video = document.getElementById('webcam');
    const btn = document.getElementById('sysBtn');

    // Gesture Action Logic
    function handleGestures(results) {
        if (!isLive || !results.multiHandLandmarks) return;

        for (const landmarks of results.multiHandLandmarks) {
            // Index Finger Tip (Point 8)
            const y = landmarks[8].y;

            if (y < 0.3) { // Hath screen ke upar wale hisse mein hai
                window.scrollBy({ top: 25, behavior: 'auto' });
            } 
            else if (y > 0.7) { // Hath screen ke niche wale hisse mein hai
                window.scrollBy({ top: -25, behavior: 'auto' });
            }
        }
    }

    // MediaPipe Hands Setup
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(handleGestures);

    const camera = new Camera(video, {
        onFrame: async () => {
            if (isLive) await hands.send({image: video});
        },
        width: 640, height: 480
    });

    function toggleMSystem() {
        if (!isLive) {
            isLive = true;
            btn.innerText = "SYSTEM: ON";
            btn.className = "toggle-btn active";
            camera.start();
        } else {
            location.reload(); // Hard stop for security
        }
    }
</script>
</body>
</html>
