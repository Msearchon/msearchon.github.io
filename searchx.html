    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --accent: #1a73e8;
            --text: #ffffff;
            --border: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 100px;
            text-align: center;
        }

        .logo {
            font-size: 45px;
            letter-spacing: 5px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* Search Section */
        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-bar {
            display: flex;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 12px 25px;
            transition: 0.3s;
        }

        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(26, 115, 232, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 17px;
        }

        /* Suggestion Dropdown */
        #suggBox {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: none;
            z-index: 1000;
            text-align: left;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .s-item {
            padding: 12px 25px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            color: #bbb;
        }

        .s-item:hover {
            background: #252525;
            color: var(--accent);
        }

        /* Result Panel */
        #resultBox {
            margin-top: 40px;
            background: var(--panel);
            border-radius: 20px;
            padding: 30px;
            text-align: left;
            display: none;
            border-left: 4px solid var(--accent);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .res-type { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .res-title { font-size: 24px; color: var(--accent); margin: 10px 0; }
        .res-body { font-size: 16px; line-height: 1.6; color: #ccc; }
    </style>
</head>

    const input = document.getElementById('query');
    const suggBox = document.getElementById('suggBox');
    const resBox = document.getElementById('resultBox');

    /* 2. ENGINE LOGIC */
    input.addEventListener('input', () => {
        let q = input.value.toLowerCase().trim();
        if (q.length > 0) {
            renderSuggestions(q);
            processSearch(q);
        } else {
            suggBox.style.display = 'none';
            resBox.style.display = 'none';
        }
    });

    function processSearch(q) {
        let found = false;
        // Sort keys by length to prevent partial match errors
        let keys = Object.keys(smartData.entities).sort((a,b) => b.length - a.length);

        for (let key of keys) {
            let entity = smartData.entities[key];
            let names = [key, ...entity.aliases];

            // Match exact entity name or name followed by space (for property search)
            let match = names.find(n => q === n || q.startsWith(n + " "));

            if (match) {
                let props = entity.properties;
                let label = "Entity Overview";
                let content = props.about;

                // Extract requested property
                let remaining = q.replace(match, "").trim();
                if (remaining !== "") {
                    for (let p in props) {
                        if (remaining.includes(p)) {
                            label = p.toUpperCase() + " DATA";
                            content = props[p];
                            break;
                        }
                    }
                }

                updateUI(label, key.toUpperCase(), content);
                found = true;
                break;
            }
        }
        if (!found) resBox.style.display = 'none';
    }

    /* 3. SUGGESTION SYSTEM */
    function renderSuggestions(q) {
        let matches = Object.keys(smartData.entities).filter(k => k.includes(q));
        if (matches.length > 0) {
            suggBox.innerHTML = matches.map(m => `
                <div class="s-item" onclick="selectSuggestion('${m}')">
                    ${m.toUpperCase()}
                </div>
            `).join('');
            suggBox.style.display = 'block';
        } else {
            suggBox.style.display = 'none';
        }
    }

    function selectSuggestion(m) {
        input.value = m;
        suggBox.style.display = 'none';
        processSearch(m);
    }

    function updateUI(label, title, body) {
        document.getElementById('resType').innerText = label;
        document.getElementById('resTitle').innerText = title;
        document.getElementById('resBody').innerText = body;
        resBox.style.display = 'block';
    }

    // Close suggestions on click outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) {
            suggBox.style.display = 'none';
        }
    });
</script>
