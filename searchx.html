<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchX | Universal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --panel: #0d1420;
            --panel2: #111926;
            --accent: #00c8ff;
            --accent2: #7b2fff;
            --text: #e8f4ff;
            --border: #1e2d42;
            --muted: #4a6280;
            --glow: rgba(0, 200, 255, 0.15);
            --ai-color: #7b2fff;
            --ai-glow: rgba(123, 47, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(0,200,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 680px;
            margin-top: 70px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 10px;
        }
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #00c8ff 0%, #7b2fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(0,200,255,0.3));
        }
        .logo-sub {
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Search */
        .search-wrapper {
            position: relative;
            width: 100%;
            margin-top: 36px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0;
            transition: 0.3s;
            clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
            position: relative;
        }

        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 0 25px var(--glow);
        }

        .search-icon {
            padding: 14px 16px 14px 20px;
            color: var(--muted);
            font-size: 18px;
            flex-shrink: 0;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 17px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 400;
            padding: 16px 0;
            letter-spacing: 0.5px;
        }

        input::placeholder { color: var(--muted); }

        .search-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 10px 20px;
            margin: 6px 8px;
            cursor: pointer;
            clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
            transition: 0.2s;
            flex-shrink: 0;
        }
        .search-btn:hover { opacity: 0.85; transform: scale(0.98); }

        /* Suggestions */
        #suggBox {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: none;
            z-index: 1000;
            text-align: left;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
        }

        .s-item {
            padding: 11px 22px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-size: 14px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.15s;
        }
        .s-item:last-child { border-bottom: none; }
        .s-item:hover { background: rgba(0,200,255,0.05); color: var(--accent); }
        .s-item::before { content: '›'; font-size: 18px; opacity: 0.4; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 6px;
            margin-top: 24px;
            justify-content: center;
        }
        .tab {
            padding: 7px 18px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            clip-path: polygon(6px 0, 100% 0, calc(100%-6px) 100%, 0 100%);
            transition: 0.2s;
        }
        .tab.active, .tab:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,200,255,0.06);
        }
        .tab.ai-tab.active, .tab.ai-tab:hover {
            border-color: var(--ai-color);
            color: var(--ai-color);
            background: var(--ai-glow);
        }

        /* Result Box */
        #resultBox {
            margin-top: 28px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 28px;
            text-align: left;
            display: none;
            border-left: 3px solid var(--accent);
            animation: slideUp 0.35s ease;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
        }

        #resultBox.ai-result {
            border-left-color: var(--ai-color);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-badge {
            display: inline-block;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 3px;
            padding: 3px 10px;
            border: 1px solid var(--accent);
            color: var(--accent);
            margin-bottom: 14px;
            clip-path: polygon(4px 0, 100% 0, calc(100%-4px) 100%, 0 100%);
        }

        .res-badge.ai-badge {
            border-color: var(--ai-color);
            color: var(--ai-color);
        }

        .res-title {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            color: var(--accent);
            margin-bottom: 14px;
            letter-spacing: 2px;
        }

        .res-title.ai-title { color: var(--ai-color); }

        .res-body {
            font-size: 16px;
            line-height: 1.7;
            color: #a8c0d8;
        }

        /* Properties Table */
        .props-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 16px;
            margin-top: 16px;
        }
        .prop-key {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--accent);
            padding: 4px 0;
            white-space: nowrap;
            opacity: 0.7;
        }
        .prop-val {
            font-size: 15px;
            color: var(--text);
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        /* AI Chat Panel */
        #aiPanel {
            margin-top: 28px;
            display: none;
            flex-direction: column;
            gap: 0;
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 3px solid var(--ai-color);
            border-radius: 4px;
            overflow: hidden;
            clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
            animation: slideUp 0.35s ease;
        }

        .ai-header {
            background: rgba(123,47,255,0.1);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .ai-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--ai-color);
            box-shadow: 0 0 8px var(--ai-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .ai-header-text {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--ai-color);
        }

        #chatMessages {
            padding: 20px 24px;
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #chatMessages::-webkit-scrollbar { width: 4px; }
        #chatMessages::-webkit-scrollbar-track { background: transparent; }
        #chatMessages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg {
            display: flex;
            gap: 12px;
            animation: slideUp 0.3s ease;
        }

        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            flex-shrink: 0;
            clip-path: polygon(4px 0, 100% 0, calc(100%-4px) 100%, 0 100%);
        }

        .msg.ai .msg-avatar { background: rgba(123,47,255,0.2); color: var(--ai-color); border: 1px solid var(--ai-color); }
        .msg.user .msg-avatar { background: rgba(0,200,255,0.15); color: var(--accent); border: 1px solid var(--accent); }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 3px;
            font-size: 15px;
            line-height: 1.6;
        }

        .msg.ai .msg-bubble {
            background: rgba(123,47,255,0.08);
            border: 1px solid rgba(123,47,255,0.2);
            color: #c0b8e8;
        }

        .msg.user .msg-bubble {
            background: rgba(0,200,255,0.08);
            border: 1px solid rgba(0,200,255,0.2);
            color: #a8d8f0;
            text-align: right;
        }

        .typing-indicator {
            display: flex; gap: 4px; align-items: center; padding: 4px 0;
        }
        .typing-indicator span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--ai-color); opacity: 0.4;
            animation: blink 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

        .chat-input-row {
            display: flex;
            gap: 0;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--panel2);
        }

        #chatInput {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-right: none;
            color: var(--text);
            padding: 11px 16px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            outline: none;
            border-radius: 3px 0 0 3px;
            transition: 0.2s;
        }
        #chatInput:focus { border-color: var(--ai-color); }

        #chatSend {
            background: var(--ai-color);
            border: none;
            color: white;
            padding: 11px 20px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 0 3px 3px 0;
            transition: 0.2s;
        }
        #chatSend:hover { opacity: 0.85; }
        #chatSend:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Not found */
        .not-found {
            margin-top: 28px;
            padding: 22px 28px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 3px solid #ff4466;
            border-radius: 4px;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .not-found-title {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: #ff4466;
            margin-bottom: 8px;
        }
        .not-found-body {
            font-size: 15px;
            color: var(--muted);
            line-height: 1.6;
        }
        .ask-ai-btn {
            margin-top: 14px;
            background: transparent;
            border: 1px solid var(--ai-color);
            color: var(--ai-color);
            padding: 8px 18px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            cursor: pointer;
            clip-path: polygon(5px 0, 100% 0, calc(100%-5px) 100%, 0 100%);
            transition: 0.2s;
        }
        .ask-ai-btn:hover { background: var(--ai-glow); }

        /* Status bar */
        .status-bar {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--muted);
        }
        .status-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 5px #00ff88; margin-right: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-wrap">
        <div class="logo">SearchX</div>
        <div class="logo-sub">Universal Intelligence Engine</div>
    </div>

    <div class="search-wrapper">
        <div class="search-bar">

            <input type="text" id="query" placeholder="Search anything..." autocomplete="off">
            <button class="search-btn" onclick="doSearch()">SEARCH</button>
        </div>
        <div id="suggBox"></div>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-all" onclick="switchTab('all')">ALL</button>
        <button class="tab ai-tab" id="tab-ai" onclick="switchTab('ai')">⚡ AI CHAT</button>
    </div>

    <!-- Database Result -->
    <div id="resultBox">
        <div class="res-badge" id="resBadge">DATABASE</div>
        <div class="res-title" id="resTitle"></div>
        <div class="res-body" id="resBody"></div>
        <div class="props-grid" id="propsGrid"></div>
    </div>

    <!-- Not Found Message -->
    <div class="not-found" id="notFound">
        <div class="not-found-title">⚠ NO RESULTS FOUND</div>
        <div class="not-found-body" id="notFoundQuery"></div>
        <button class="ask-ai-btn" onclick="askAIWithQuery()">⚡ ASK AI INSTEAD</button>
    </div>

    <!-- AI Chat Panel -->
    <div id="aiPanel">
        <div class="ai-header">
            <div class="ai-dot"></div>
            <div class="ai-header-text">AI INTELLIGENCE — POWERED BY CLAUDE</div>
        </div>
        <div id="chatMessages"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') sendChat()">
            <button id="chatSend" onclick="sendChat()">SEND</button>
        </div>
    </div>

    <div class="status-bar">
        <span><span class="status-dot"></span>SYSTEM ONLINE</span>
        <span id="dbCount">— ENTITIES LOADED</span>
    </div>
</div>

/* ====== DOM ====== */
const input = document.getElementById('query');
const suggBox = document.getElementById('suggBox');
const resultBox = document.getElementById('resultBox');
const notFound = document.getElementById('notFound');
const aiPanel = document.getElementById('aiPanel');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');

let currentTab = 'all';
let chatHistory = [];
let lastQuery = '';

// DB count
document.getElementById('dbCount').textContent = Object.keys(smartData.entities).length + ' ENTITIES LOADED';

/* ====== TABS ====== */
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    document.getElementById('tab-ai').classList.toggle('active', tab === 'ai');
    if (tab === 'ai') {
        resultBox.style.display = 'none';
        notFound.style.display = 'none';
        aiPanel.style.display = 'flex';
        if (chatMessages.children.length === 0) {
            addAIMessage("Assalamu Alaikum! Main SearchX AI hoon. Aap mujhse kuch bhi pooch sakte hain — SearchX database ke baare mein ya koi bhi general sawaal.");
        }
        chatInput.focus();
    } else {
        aiPanel.style.display = 'none';
        if (lastQuery) doSearch();
    }
}

/* ====== SEARCH ====== */
input.addEventListener('input', () => {
    let q = input.value.toLowerCase().trim();
    if (q.length > 0) renderSuggestions(q);
    else { suggBox.style.display = 'none'; resultBox.style.display = 'none'; notFound.style.display = 'none'; }
});

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

function doSearch() {
    let q = input.value.toLowerCase().trim();
    if (!q) return;
    lastQuery = q;
    suggBox.style.display = 'none';
    if (currentTab === 'ai') { return; }
    let found = processSearch(q);
    if (!found) {
        resultBox.style.display = 'none';
        notFound.style.display = 'block';
        document.getElementById('notFoundQuery').textContent = 'No results for "' + input.value + '" in database. Try asking AI!';
    }
}

function processSearch(q) {
    let keys = Object.keys(smartData.entities).sort((a,b) => b.length - a.length);
    for (let key of keys) {
        let entity = smartData.entities[key];
        let names = [key, ...entity.aliases];
        let match = names.find(n => q === n || q.startsWith(n + " "));
        if (match) {
            let props = entity.properties;
            let content = props.about;
            let label = "DATABASE";
            let remaining = q.replace(match, "").trim();
            if (remaining !== "") {
                for (let p in props) {
                    if (remaining.includes(p)) {
                        label = p.toUpperCase() + " DATA";
                        content = props[p];
                        break;
                    }
                }
            }
            showResult(label, key.toUpperCase(), content, props);
            return true;
        }
    }
    return false;
}

function showResult(label, title, about, props) {
    notFound.style.display = 'none';
    document.getElementById('resBadge').textContent = label;
    document.getElementById('resBadge').className = 'res-badge';
    document.getElementById('resTitle').textContent = title;
    document.getElementById('resTitle').className = 'res-title';
    document.getElementById('resBody').textContent = about;

    // Properties grid
    const grid = document.getElementById('propsGrid');
    grid.innerHTML = '';
    const skip = ['about'];
    for (let k in props) {
        if (skip.includes(k)) continue;
        const keyEl = document.createElement('div');
        keyEl.className = 'prop-key';
        keyEl.textContent = k.toUpperCase();
        const valEl = document.createElement('div');
        valEl.className = 'prop-val';
        valEl.textContent = props[k];
        grid.appendChild(keyEl);
        grid.appendChild(valEl);
    }
    resultBox.className = 'resultBox';
    resultBox.style.display = 'block';
    // re-trigger animation
    resultBox.style.animation = 'none';
    resultBox.offsetHeight;
    resultBox.style.animation = '';
}

/* ====== SUGGESTIONS ====== */
function renderSuggestions(q) {
    let matches = [];
    for (let key of Object.keys(smartData.entities)) {
        let entity = smartData.entities[key];
        let names = [key, ...entity.aliases];
        if (names.some(n => n.includes(q))) { matches.push(key); }
    }
    matches = matches.slice(0, 6);
    if (matches.length > 0) {
        suggBox.innerHTML = matches.map(m => `<div class="s-item" onclick="selectSuggestion('${m}')">${m.toUpperCase()}</div>`).join('');
        suggBox.style.display = 'block';
    } else {
        suggBox.style.display = 'none';
    }
}

function selectSuggestion(m) {
    input.value = m;
    suggBox.style.display = 'none';
    lastQuery = m;
    let found = processSearch(m);
    if (!found) { notFound.style.display = 'block'; resultBox.style.display = 'none'; }
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) suggBox.style.display = 'none';
});

/* ====== AI CHAT ====== */
function askAIWithQuery() {
    switchTab('ai');
    let q = input.value.trim();
    if (q) {
        chatInput.value = q;
        sendChat();
    }
}

function addAIMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-bubble">${text}</div>`;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addUserMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'msg user';
    msg.innerHTML = `<div class="msg-avatar">YOU</div><div class="msg-bubble">${text}</div>`;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing';
    msg.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
}

async function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    chatSend.disabled = true;
    addUserMessage(text);
    chatHistory.push({ role: 'user', content: text });
    addTyping();

    // Build system prompt with SearchX data summary
    const systemPrompt = `You are the AI assistant for SearchX, a universal search engine. SearchX has a database of entities including companies, apps, people, countries, and systems — all part of a fictional universe created by M.H (Mehdi Hasan), founder of MGPLC.

Key facts: MGPLC founded by M.H in 2017. M Search is a mini search engine created 2023. The database contains entities like ATABB, PPLCO, REDX (entertainment), CPAY, SSBPAY, TURBO, EDI (finance), ESM Airlines, DEDF Group, Bank of MCity, and many more companies. Countries include M Desh (capital: MCity), Ron Desh, I Desh, X Desh, etc. International groups: MRI and MRC.

Answer questions helpfully. If asked about SearchX database entities, use your knowledge of the data. For general questions, answer normally. Keep answers concise and clear. You can respond in both English and Hinglish (Hindi+English mix) based on what the user uses.`;

    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                system: systemPrompt,
                messages: chatHistory
            })
        });
        const data = await response.json();
        removeTyping();
        const reply = data.content && data.content[0] ? data.content[0].text : "Sorry, koi response nahi mila.";
        chatHistory.push({ role: 'assistant', content: reply });
        addAIMessage(reply);
    } catch (err) {
        removeTyping();
        addAIMessage("Connection error. Please try again.");
    }
    chatSend.disabled = false;
    chatInput.focus();
}

chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
