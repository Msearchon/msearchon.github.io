<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SEARCH | CEO ADVANCED COMMAND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon-green: #0f0; --neon-red: #ff4444; --bg: #050505; --card: #111; --blue: #8ab4f8; }
        body { background: var(--bg); color: #ccc; font-family: 'Segoe UI', monospace; padding: 20px; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-green); padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: var(--neon-green); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 22px; }

        /* SEARCH SYSTEM IN SERVER */
        .server-search-box { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; display: flex; gap: 10px; }
        .server-search-box input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        
        .user-card { background: var(--card); border: 1px solid #222; padding: 20px; margin-bottom: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; }
        .user-card:hover { border-color: #444; }
        
        .main-info { display: flex; justify-content: space-between; align-items: flex-start; }
        .id { color: var(--blue); font-weight: bold; }
        
        .history-box { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #222; display: none; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .history-tag { display: inline-block; background: #222; color: var(--blue); padding: 4px 10px; border-radius: 4px; margin: 3px; font-size: 12px; border: 1px solid #333; }

        .btn { padding: 8px 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 11px; text-transform: uppercase; }
        .btn-history { background: #444; color: white; margin-top: 10px; }
        .btn-ban { background: var(--neon-red); color: white; }
        .btn-sus { background: #fbbc05; color: black; }
        .btn-active { background: #34a853; color: white; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; pt: 15px; margin-top: 10px; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1>M-SEARCH CENTRAL SERVER</h1>
        <div style="text-align:right">
            <small>System Status:</small> <b style="color:lime;">ONLINE</b><br>
            <small>Total Users:</small> <b id="totalUsers" style="color:var(--blue);">0</b>
        </div>
    </div>

    <div class="server-search-box">
        <input type="text" id="serverSearchInput" placeholder="Search by Name or M-ID..." oninput="filterUsers()">
        <div style="color:gray; font-size:12px; align-self:center;">CEO Filtering Mode</div>
    </div>
    
    <div id="usersList">Syncing Encrypted Data...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY", 
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "m-bot-server"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allUsersData = [];

        // REAL-TIME DATA FETCH
        db.ref('users').on('value', (snapshot) => {
            const users = snapshot.val();
            allUsersData = [];
            for(let id in users) { allUsersData.push({ id, ...users[id] }); }
            
            // Sort: Newest First
            allUsersData.sort((a, b) => (b.lastLogin || 0) - (a.lastLogin || 0));
            
            document.getElementById("totalUsers").innerText = allUsersData.length;
            renderUsers(allUsersData);
        });

        function renderUsers(data) {
            const list = document.getElementById("usersList");
            list.innerHTML = "";
            
            data.forEach(u => {
                const safeEmail = u.email ? u.email.replace(/\./g, ',') : u.id;
                
                // History Items
                let historyHtml = "";
                if(u.history) {
                    const logs = Object.values(u.history).reverse();
                    logs.forEach(query => {
                        historyHtml += `<span class="history-tag">${query}</span>`;
                    });
                } else {
                    historyHtml = "<i style='color:gray; font-size:12px;'>No recent searches.</i>";
                }

                list.innerHTML += `
                    <div class="user-card" id="card_${u.id}">
                        <div class="main-info">
                            <div>
                                <p><b style="color:white; font-size:18px;">${u.name}</b></p>
                                <p style="font-size:13px;">Email: ${u.email}</p>
                                <p style="font-size:13px;">M-ID: <span class="id">${u.id}</span></p>
                            </div>
                            <div style="text-align:right;">
                                <span style="font-size:10px; color:gray;">STATUS</span><br>
                                <b style="color:${u.status === 'Banned' ? 'red' : u.status === 'Suspended' ? 'orange' : 'lime'}">${u.status}</b>
                            </div>
                        </div>

                        <button class="btn btn-history" onclick="toggleHistory('${u.id}')">View User Search History ▼</button>
                        <div class="history-box" id="hist_${u.id}">
                            <p style="font-size:11px; color:gray; margin-bottom:10px;">RECENT SEARCH LOGS:</p>
                            ${historyHtml}
                        </div>

                        <div class="controls-row">
                            <div style="display:flex; gap:5px;">
                                <input type="number" id="val_${u.id}" value="10" style="width:50px; background:#000; border:1px solid #444; color:white; padding:5px; border-radius:4px;">
                                <button class="btn btn-sus" onclick="suspendUser('${u.id}')">Suspend (Min)</button>
                            </div>
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-ban" onclick="changeStatus('${u.id}', 'Banned')">Ban</button>
                                <button class="btn btn-active" onclick="changeStatus('${u.id}', 'Active')">Active</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // SERVER INTERIOR SEARCH LOGIC
        function filterUsers() {
            const term = document.getElementById("serverSearchInput").value.toLowerCase();
            const filtered = allUsersData.filter(u => 
                u.name.toLowerCase().includes(term) || 
                u.id.toLowerCase().includes(term) ||
                u.email.toLowerCase().includes(term)
            );
            renderUsers(filtered);
        }

        function toggleHistory(id) {
            const box = document.getElementById("hist_" + id);
            box.style.display = box.style.display === "block" ? "none" : "block";
        }

        function changeStatus(id, status) {
            db.ref('users/' + id).update({ status: status });
        }

        function suspendUser(id) {
            const mins = document.getElementById("val_" + id).value;
            const until = Date.now() + (mins * 60 * 1000);
            db.ref('users/' + id).update({ status: "Suspended", banUntil: until });
        }
    </script>
</body>
</html>
