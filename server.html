<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SEARCH | ADVANCED CEO COMMAND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon-green: #0f0; --neon-red: #ff4444; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #ccc; font-family: 'Segoe UI', monospace; padding: 20px; }
        h1 { color: var(--neon-green); border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; flex: 1; text-align: center; }
        .stat-box b { font-size: 20px; color: var(--neon-green); }

        .user-card { background: var(--card); border: 1px solid #222; padding: 20px; margin-bottom: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .user-card:hover { border-color: #444; background: #161616; }
        
        .user-info p { margin: 4px 0; }
        .id { color: #8ab4f8; font-family: monospace; }
        .status-active { color: #34a853; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .status-suspended { color: #fbbc05; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .status-banned { color: var(--neon-red); font-weight: bold; text-transform: uppercase; font-size: 12px; }

        .controls { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .suspend-input-group { display: flex; gap: 5px; }
        input[type="number"] { width: 60px; background: #000; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 4px; }
        select { background: #000; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 4px; }

        .btn { padding: 8px 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 11px; text-transform: uppercase; }
        .btn-ban { background: var(--neon-red); color: white; }
        .btn-sus { background: #fbbc05; color: black; }
        .btn-active { background: #34a853; color: white; }
    </style>
</head>
<body>

    <h1>M-SEARCH CONTROL CENTER</h1>
    <div class="stats">
        <div class="stat-box">System Status<br><b id="sysStatus">ONLINE</b></div>
        <div class="stat-box">Total Users<br><b id="totalUsers">0</b></div>
    </div>
    
    <div id="usersList">Initialising Advanced Link...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY", 
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "m-bot-server"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // REAL-TIME SYNC WITH SORTING
        db.ref('users').on('value', (snapshot) => {
            const users = snapshot.val();
            const list = document.getElementById("usersList");
            const totalBox = document.getElementById("totalUsers");
            list.innerHTML = "";
            
            if(!users) { list.innerHTML = "<p>Empty Database.</p>"; return; }

            // SORTING: Newest (Timestamp) first
            let userArray = [];
            for(let id in users) { userArray.push({ id, ...users[id] }); }
            userArray.sort((a, b) => (b.lastLogin || 0) - (a.lastLogin || 0));

            totalBox.innerText = userArray.length;

            userArray.forEach(u => {
                let statusClass = "status-active";
                let statusText = u.status;
                let banCountdown = "";

                // Check if Suspension is expired
                if(u.status === "Suspended" && u.banUntil) {
                    if(Date.now() > u.banUntil) {
                        statusText = "Active (Suspension Expired)";
                        statusClass = "status-active";
                    } else {
                        statusClass = "status-suspended";
                        let timeLeft = Math.round((u.banUntil - Date.now()) / 60000);
                        banCountdown = `<br><span style="color:orange; font-size:11px;">Expires in: ${timeLeft} min</span>`;
                    }
                } else if(u.status === "Banned") {
                    statusClass = "status-banned";
                }

                list.innerHTML += `
                    <div class="user-card">
                        <div class="user-info">
                            <p><b style="color:white; font-size:16px;">${u.name}</b></p>
                            <p>Email: ${u.email}</p>
                            <p>M-ID: <span class="id">${u.id}</span></p>
                            <p>Status: <span class="${statusClass}">${statusText}</span> ${banCountdown}</p>
                        </div>
                        <div class="controls">
                            <div class="suspend-input-group">
                                <input type="number" id="val_${u.id}" value="10">
                                <select id="unit_${u.id}">
                                    <option value="m">Min</option>
                                    <option value="h">Hrs</option>
                                    <option value="d">Days</option>
                                </select>
                                <button class="btn btn-sus" onclick="suspendUser('${u.id}')">Suspend</button>
                            </div>
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-ban" onclick="changeStatus('${u.id}', 'Banned')">Perm Ban</button>
                                <button class="btn btn-active" onclick="changeStatus('${u.id}', 'Active')">Activate</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        function changeStatus(id, status) {
            db.ref('users/' + id).update({ status: status, banUntil: null })
              .then(() => alert(id + " is " + status));
        }

        function suspendUser(id) {
            let val = document.getElementById("val_" + id).value;
            let unit = document.getElementById("unit_" + id).value;
            let ms = 0;

            if(unit === 'm') ms = val * 60 * 1000;
            if(unit === 'h') ms = val * 60 * 60 * 1000;
            if(unit === 'd') ms = val * 24 * 60 * 60 * 1000;

            let banUntil = Date.now() + ms;

            db.ref('users/' + id).update({ 
                status: "Suspended", 
                banUntil: banUntil 
            }).then(() => alert(id + " suspended for " + val + unit));
        }
    </script>
</body>
</html>
