<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Global Knowledge Engine</title>
    <style>
        :root { --blue: #4285F4; --bg: #0f0f0f; --card: #1a1a1a; --text: #e8eaed; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }
        
        header { padding: 40px 5%; text-align: center; }
        .logo { font-size: 50px; font-weight: bold; color: var(--blue); margin-bottom: 20px; }
        .logo span { color: white; }

        .search-area { max-width: 600px; margin: auto; position: relative; }
        input { 
            width: 100%; height: 55px; border-radius: 28px; border: 1px solid #333;
            background: var(--card); color: white; padding: 0 25px; font-size: 17px; outline: none;
        }
        input:focus { border-color: var(--blue); }

        /* Results & Suggestions */
        #suggestions { 
            position: absolute; width: 94%; left: 3%; background: #222; 
            top: 58px; border-radius: 0 0 15px 15px; display: none; z-index: 10;
        }
        .suggest-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #333; }
        .suggest-item:hover { background: #333; color: var(--blue); }

        #resultBox { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--blue); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">M <span>Search</span></div>
    <div class="search-area">
        <input type="text" id="qInput" placeholder="Search M-Universal Database..." oninput="handleTyping(this.value)" onkeydown="if(event.key==='Enter') startSearch()">
        <div id="suggestions"></div>
    </div>
</header>

<div id="resultBox"></div>

<script src="DATA.html"></script>

<script>
    // 1. DATA FIX: Agar DATA.html se data sahi format mein nahi aa raha, toh hum manually check karenge
    function startSearch() {
        const q = document.getElementById("qInput").value.toLowerCase().trim();
        const resBox = document.getElementById("resultBox");
        document.getElementById("suggestions").style.display = "none";

        // M_Universal API check
        if (typeof M_Universal !== 'undefined') {
            const response = M_Universal.search(q);
            if (response.status === "success") {
                displayResult(q, response.result);
                return;
            }
        }
        
        resBox.innerHTML = "<p style='text-align:center; opacity:0.5;'>No data found in M-Universal Database.</p>";
    }

    function displayResult(title, data) {
        const resBox = document.getElementById("resultBox");
        let html = `<div class="card">`;
        if (typeof data === 'object') {
            html += `<h2 style="color:var(--blue); margin-top:0;">${title.toUpperCase()}</h2>`;
            html += `<p>${data.about || 'Information available'}</p>`;
            if(data.founder) html += `<small><b>Founder:</b> ${data.founder}</small><br>`;
            if(data.created) html += `<small><b>Established:</b> ${data.created}</small>`;
        } else {
            html += `<h2 style="color:var(--blue); margin-top:0;">Result</h2>`;
            html += `<p>${data}</p>`;
        }
        html += `</div>`;
        resBox.innerHTML = html;
    }

    function handleTyping(val) {
        const sugBox = document.getElementById("suggestions");
        if (!val || typeof M_Universal === 'undefined') { sugBox.style.display = "none"; return; }

        const matches = M_Universal.getSuggestions(val);
        if (matches.length > 0) {
            sugBox.innerHTML = matches.map(m => `<div class="suggest-item" onclick="setQuery('${m}')">${m}</div>`).join('');
            sugBox.style.display = "block";
        } else {
            sugBox.style.display = "none";
        }
    }

    function setQuery(m) {
        document.getElementById("qInput").value = m;
        startSearch();
    }
</script>

</body>
</html>
