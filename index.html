<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Global Engine</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); }
        
        /* Account Login Box */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 320px; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; }
        .auth-card button { width: 100%; padding: 12px; background: var(--blue); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        
        #mainApp { display: none; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="color:var(--blue);">M-Verify</h2>
            <input type="text" id="uName" placeholder="Full Name">
            <input type="email" id="uEmail" placeholder="Gmail Address">
            <button id="regBtn" onclick="mRegister()">LOGIN</button>
            <p id="statusMsg" style="font-size:12px; margin-top:10px; color:gray;"></p>
        </div>
    </div>

    <div id="mainApp">
        <h1 style="color:var(--blue);">M SEARCH</h1>
        <p>Welcome, <b id="userName"></b></p>
        <input type="text" placeholder="Search..." style="padding:10px; border-radius:20px; width:80%;">
    </div>

    <script>
        // 1. Aapka Config
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY",
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "m-bot-server"
        };

        // 2. Initialize (Error handling ke saath)
        try {
            firebase.initializeApp(firebaseConfig);
        } catch (e) {
            console.log("Firebase already exists");
        }

        const db = firebase.database();

        // 3. Auto Login Check
        window.onload = () => {
            const id = localStorage.getItem("m_id");
            if(id) showDashboard(id);
        }

        function showDashboard(id) {
            document.getElementById("authOverlay").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            db.ref('users/' + id).once('value').then(s => {
                if(s.val()) document.getElementById("userName").innerText = s.val().name;
            });
        }

        // 4. Registration Function
        function mRegister() {
            const n = document.getElementById("uName").value;
            const e = document.getElementById("uEmail").value;
            const msg = document.getElementById("statusMsg");

            if(!n || !e) { alert("Details bhariye!"); return; }

            msg.innerText = "Connecting to Server...";
            const mID = "M-" + Math.floor(Math.random()*9999);

            // Database mein data bhej raha hai
            db.ref('users/' + mID).set({
                name: n,
                email: e,
                status: "Active"
            }).then(() => {
                localStorage.setItem("m_id", mID);
                showDashboard(mID);
            }).catch(err => {
                msg.innerText = "Error: Check Internet or Rules!";
                console.error(err);
            });
        }
    </script>
</body>
</html>
