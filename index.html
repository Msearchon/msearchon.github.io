<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Google Verified</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .google-btn { background: white; color: #444; padding: 12px 24px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Ban Screen */
        #banScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff4444; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 10000; }

        /* Profile Section (Inside Header) */
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; }
        .user-profile { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 5px 15px; border-radius: 50px; border: 1px solid #333; cursor: pointer; }
        .user-profile img { width: 30px; height: 30px; border-radius: 50%; }
        .user-profile span { font-size: 13px; color: var(--blue); }

        /* Main Search UI */
        #mainContent { display: none; }
        .search-area { text-align: center; margin-top: 50px; }
        .m-input { width: 80%; max-width: 600px; padding: 14px 25px; border-radius: 30px; border: 1px solid #5f6368; background: #202124; color: white; outline: none; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1 style="color:var(--blue); font-size: 40px; margin-bottom: 30px;">M Search</h1>
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
            Sign in with Google
        </button>
        <p id="loadMsg" style="margin-top: 15px; font-size: 12px; color: gray;"></p>
    </div>

    <div id="banScreen">
        <h1 style="font-size: 50px;">CEO ALERT: BANNED</h1>
        <p style="font-size: 18px; color: white;">Your Account ID has been blocked by the Administrator.</p>
        <button onclick="logout()" style="margin-top:20px; padding:10px 20px; background:#444; color:white; border:none; border-radius:5px; cursor:pointer;">Try Another Account</button>
    </div>

    <div id="mainContent">
        <div class="header-top">
            <div style="font-size: 20px; font-weight: bold; color: var(--blue);">M Search</div>
            <div class="user-profile" id="userMenu">
                <img id="userPhoto" src="" alt="">
                <span id="userName">User</span>
                <button onclick="logout()" style="background:transparent; border:none; color:gray; font-size:10px; cursor:pointer; margin-left:10px;">Logout</button>
            </div>
        </div>

        <div class="search-area">
            <h1 style="color:#4285F4; font-size: 60px; margin-top: 80px;">M</h1>
            <p style="margin-top: -30px; margin-bottom: 40px; color: gray;">Verified ID: <span id="userID" style="color:yellow;"></span></p>
            <input type="text" class="m-input" placeholder="Search globally with Google verification...">
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY",
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "m-bot-server"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- AUTH OBSERVER (Automatic Login Check) ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                checkBanStatus(user);
            } else {
                document.getElementById("loginScreen").style.display = "flex";
                document.getElementById("mainContent").style.display = "none";
                document.getElementById("banScreen").style.display = "none";
            }
        });

        // --- GOOGLE LOGIN FUNCTION ---
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            document.getElementById("loadMsg").innerText = "Verifying Google Account...";
            auth.signInWithPopup(provider).catch(err => alert(err.message));
        }

        // --- BAN CHECK LOGIC ---
        function checkBanStatus(user) {
            const safeId = user.uid; // Unique Google ID
            db.ref('users/' + safeId).on('value', (snap) => {
                const data = snap.val();
                
                // Pehli baar login par data save karein
                if (!data) {
                    db.ref('users/' + safeId).set({
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        status: "Active",
                        mID: safeId
                    });
                }

                if (data && data.status === "Banned") {
                    document.getElementById("mainContent").style.display = "none";
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("banScreen").style.display = "flex";
                } else {
                    showApp(user);
                }
            });
        }

        function showApp(user) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("banScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
            
            document.getElementById("userName").innerText = user.displayName;
            document.getElementById("userPhoto").src = user.photoURL;
            document.getElementById("userID").innerText = user.uid.substring(0, 10) + "...";
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }
    </script>
</body>
</html>
