<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Professional</title>
    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        header { display: flex; align-items: center; padding: 15px 5%; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; color: #4285F4; text-decoration: none; margin-right: 25px; cursor: pointer; }
        .logo span { color: white; }
        .search-box { flex: 1; max-width: 600px; }
        .search-input { width: 100%; height: 44px; border-radius: 22px; border: 1px solid #5f6368; background: #202124; color: white; padding: 0 20px; outline: none; }

        .tabs { display: flex; gap: 20px; padding: 10px 5% 0 150px; font-size: 14px; color: #9aa0a6; border-bottom: 1px solid #333; }
        .tab { padding-bottom: 10px; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

        main { padding: 20px 5% 40px 150px; max-width: 1000px; }
        
        /* WEB STYLE */
        .res-item { margin-bottom: 30px; animation: fadeIn 0.5s; }
        .res-title { font-size: 20px; color: var(--blue); text-decoration: none; display: block; margin-bottom: 5px; }
        .res-snippet { font-size: 14px; color: #bdc1c6; line-height: 1.5; }
        
        /* IMAGE GRID STYLE */
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .img-card { background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .img-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .img-card p { padding: 8px; font-size: 12px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* VIDEO LIST STYLE */
        .video-item { display: flex; gap: 15px; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .video-thumb { width: 160px; height: 90px; background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 800px) {
            header { flex-direction: column; padding: 10px; }
            .tabs { padding: 10px; justify-content: center; }
            main { padding: 20px; }
            .logo { margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href=window.location.pathname">M <span>Search</span></div>
        <div class="search-box">
            <form onsubmit="event.preventDefault(); startSearch('web');">
                <input id="qInput" type="text" class="search-input" placeholder="Search M Search...">
            </form>
        </div>
    </header>

    <div class="tabs">
        <div id="tab-web" class="tab active" onclick="startSearch('web')">All</div>
        <div id="tab-img" class="tab" onclick="startSearch('images')">Images</div>
        <div id="tab-vid" class="tab" onclick="startSearch('videos')">Videos</div>
    </div>

    <main id="resultsArea">
        <div style="text-align:center; margin-top:100px;">
            <h1 style="color:#4285F4; font-size:50px;">M Search</h1>
            <p>Type something to explore Images, Videos, and Web results.</p>
        </div>
    </main>

    <script>
        async function startSearch(type) {
            const query = document.getElementById("qInput").value.trim();
            if(!query) return;

            // UI Tab Change
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + (type === 'web' ? 'web' : type === 'images' ? 'img' : 'vid')).classList.add('active');
            
            const area = document.getElementById("resultsArea");
            area.innerHTML = "<p>Searching " + type + "...</p>";

            try {
                if (type === 'web') {
                    // WIKIPEDIA WEB RESULTS
                    const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${query}&format=json&origin=*`);
                    const data = await res.json();
                    let html = "";
                    data.query.search.forEach(item => {
                        html += `<div class="res-item">
                            <a href="https://en.wikipedia.org/wiki/${item.title}" target="_blank" class="res-title">${item.title}</a>
                            <p class="res-snippet">${item.snippet}...</p>
                        </div>`;
                    });
                    area.innerHTML = html || "No web results found.";
                } 
                else if (type === 'images') {
                    // WIKIPEDIA IMAGE DATABASE (In-page results)
                    const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${query}&prop=pageimages&format=json&pithumbsize=400&origin=*`);
                    const data = await res.json();
                    const pages = data.query.pages;
                    let html = `<div class="image-grid">`;
                    
                    // Fetching related images using another Wikipedia API
                    const imgRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&generator=images&titles=${query}&prop=imageinfo&iiprop=url&format=json&origin=*`);
                    const imgData = await imgRes.json();
                    
                    if (imgData.query && imgData.query.pages) {
                        Object.values(imgData.query.pages).forEach(img => {
                            if(img.imageinfo) {
                                html += `<div class="img-card">
                                    <img src="${img.imageinfo[0].url}" alt="result">
                                    <p>${img.title.replace('File:', '')}</p>
                                </div>`;
                            }
                        });
                        html += `</div>`;
                        area.innerHTML = html;
                    } else {
                        area.innerHTML = "No images found for this keyword in our database.";
                    }
                }
                else if (type === 'videos') {
                    // VIDEO RESULTS (Simulated Professional List)
                    area.innerHTML = `
                        <div class="video-item">
                            <div class="video-thumb">VIDEO</div>
                            <div>
                                <a href="https://www.youtube.com/results?search_query=${query}" target="_blank" class="res-title">Watch "${query}" on M-Video Player</a>
                                <p class="res-snippet">Find the latest videos and documentaries related to ${query} on our connected streaming partners.</p>
                            </div>
                        </div>
                        <div class="video-item">
                            <div class="video-thumb">M-TV</div>
                            <div>
                                <a href="https://www.bing.com/videos/search?q=${query}" target="_blank" class="res-title">${query} - Full HD Content</a>
                                <p class="res-snippet">Browse through high-quality video content indexed from around the web.</p>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                area.innerHTML = "Error loading results. Please try again.";
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if(q) {
                document.getElementById("qInput").value = q;
                startSearch('web');
            }
        };
    </script>
</body>
</html>
