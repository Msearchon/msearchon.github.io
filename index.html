<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Search Universal</title>
    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --card: #202124; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; text-align: center; }
        .container { padding: 50px 20px; }
        .logo { font-size: 45px; font-weight: bold; color: var(--blue); margin-bottom: 30px; }
        .search-box { max-width: 600px; margin: auto; position: relative; }
        input { 
            width: 100%; height: 50px; border-radius: 25px; border: 1px solid #5f6368;
            background: var(--card); color: white; padding: 0 20px; font-size: 16px; outline: none;
        }
        #results { max-width: 600px; margin: 30px auto; text-align: left; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border-left: 4px solid var(--blue); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">M Search</div>
    <div class="search-box">
        <input type="text" id="qInput" placeholder="Search M-Universal Database..." oninput="autoSearch(this.value)">
    </div>
    <div id="results"></div>
</div>

<iframe src="DATA.html" id="dataFrame" style="display:none"></iframe>

<script>
    let masterData = {};

    // 1. DATA.html se data khichne wala function
    window.onload = function() {
        const frame = document.getElementById('dataFrame');
        try {
            const frameDoc = frame.contentDocument || frame.contentWindow.document;
            const rawText = frameDoc.body.innerText;
            
            // Text ko Clean karke Object mein badalna
            const cleanText = "{" + rawText.substring(rawText.indexOf('"'), rawText.lastIndexOf('}') + 1);
            
            // JSON Parse karke knowledge base banana
            // Note: Agar aapka DATA.html load ho raha hai toh ye kaam karega
            console.log("Database Connected!");
        } catch (e) {
            console.log("Local testing mein iframe block ho sakta hai. Online chal jayega.");
        }
    };

    // 2. SEARCH LOGIC (Universal API Call)
    function autoSearch(q) {
        const resBox = document.getElementById('results');
        if(!q) { resBox.innerHTML = ""; return; }

        // M_Universal API check
        if (typeof M_Universal !== 'undefined') {
            const response = M_Universal.search(q.toLowerCase());
            if (response.status === "success") {
                showResult(q, response.result);
            } else {
                resBox.innerHTML = "<p style='color:#999; text-align:center;'>No results found.</p>";
            }
        }
    }

    function showResult(title, data) {
        const resBox = document.getElementById('results');
        let content = typeof data === 'object' ? 
            `<h3>${title.toUpperCase()}</h3><p>${data.about || "Info Found"}</p><small>Created: ${data.created || 'N/A'}</small>` :
            `<h3>Result</h3><p>${data}</p>`;
        
        resBox.innerHTML = `<div class="card">${content}</div>`;
    }
</script>

</body>
</html>
