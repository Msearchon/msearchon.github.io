}

}

.logoCircle{
width:150px;
height:150px;

display:flex;
align-items:center;
justify-content:center;
font-size:75px;
font-weight:bold;
color:white;
}
/* COMMON */
.page{ display:none; padding:22px; }
.show{ display:block; }

/* HEADER */
.header{
text-align:center;
margin-top:40px;
}

.header h1{
font-size:48px;
margin-bottom:35px;
}

/* SEARCH BAR */
.search-pad{
width:100%;
height:64px;
border-radius:40px;
border:none;
padding:0 26px;
font-size:22px;
background:#1f1f1f;
color:white;
outline:none;
}

/* BUTTON */
.search-btn{
width:100%;
height:56px;
margin-top:20px;
border-radius:35px;
border:none;
font-size:20px;
background:#4285F4;
color:white;
cursor:pointer;
}

/* BIG BOXES */
.big-box{
background:#1f1f1f;
border-radius:20px;
padding:26px;
margin-top:22px;
}

.big-box h2{
font-size:24px;
margin:0 0 10px;
}

.big-box p{
font-size:18px;
color:#ccc;
}

/* HISTORY */
.history{ margin-top:20px; }

.history-item{
padding:10px;
font-size:16px;
color:#aaa;
cursor:pointer;
}

/* PAGE BUTTONS */
.page-buttons{
display:flex;
gap:10px;
margin-bottom:10px;
}

.page-btn{
flex:1;
height:45px;
border:none;
border-radius:10px;
background:#4285F4;
color:white;
font-size:16px;
cursor:pointer;
}

/* THREE DOT */
#menuBtn{
position:absolute;
top:15px;
right:15px;
font-size:28px;
cursor:pointer;
}

/* MENU BOX */
#menuBox{
position:absolute;
top:55px;
right:15px;
background:#1f1f1f;
border-radius:10px;
padding:10px;
display:none;
}

.menu-item{
padding:10px;
cursor:pointer;
}

/* HISTORY PAGE */
#historyPage{
position: fixed;
inset: 0;
background: #0f0f0f;
padding: 20px;
display: none;
z-index: 999;

overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

#clearBtn{
background:green;
color:white;
border:none;
padding:10px;
margin-top:20px;
width:100%;
}

#closeHistory{
position:absolute;
top:15px;
right:20px;
font-size:26px;
cursor:pointer;
}

/* LIGHT MODE */
.light{
background:linear-gradient(180deg,#f4f7fb,#e9eef5);
color:#000000;
}

.light .search-pad{
background:#ffffff;
color:#000000;
border:2px solid #d0d9e5;
}

.light .big-box{
background:#ffffff;
color:#000000;
}

.light #menuBox{
background:#ffffff;
color:#000000;
}

.light #historyPage{
background:#eef3f9;
color:#1b1f24;
}

    const input = document.getElementById('query');
    const suggBox = document.getElementById('suggBox');
    const resBox = document.getElementById('resultBox');

    /* 2. ENGINE LOGIC */
    input.addEventListener('input', () => {
        let q = input.value.toLowerCase().trim();
        if (q.length > 0) {
            renderSuggestions(q);
            processSearch(q);
        } else {
            suggBox.style.display = 'none';
            resBox.style.display = 'none';
        }
    });

    function processSearch(q) {
        let found = false;
        // Sort keys by length to prevent partial match errors
        let keys = Object.keys(smartData.entities).sort((a,b) => b.length - a.length);

        for (let key of keys) {
            let entity = smartData.entities[key];
            let names = [key, ...entity.aliases];

            // Match exact entity name or name followed by space (for property search)
            let match = names.find(n => q === n || q.startsWith(n + " "));

            if (match) {
                let props = entity.properties;
                let label = "Entity Overview";
                let content = props.about;

                // Extract requested property
                let remaining = q.replace(match, "").trim();
                if (remaining !== "") {
                    for (let p in props) {
                        if (remaining.includes(p)) {
                            label = p.toUpperCase() + " DATA";
                            content = props[p];
                            break;
                        }
                    }
                }

                updateUI(label, key.toUpperCase(), content);
                found = true;
                break;
            }
        }
        if (!found) resBox.style.display = 'none';
    }

    /* 3. SUGGESTION SYSTEM */
    function renderSuggestions(q) {
        let matches = Object.keys(smartData.entities).filter(k => k.includes(q));
        if (matches.length > 0) {
            suggBox.innerHTML = matches.map(m => `
                <div class="s-item" onclick="selectSuggestion('${m}')">
                    ${m.toUpperCase()}
                </div>
            `).join('');
            suggBox.style.display = 'block';
        } else {
            suggBox.style.display = 'none';
        }
    }

    function selectSuggestion(m) {
        input.value = m;
        suggBox.style.display = 'none';
        processSearch(m);
    }

    function updateUI(label, title, body) {
        document.getElementById('resType').innerText = label;
        document.getElementById('resTitle').innerText = title;
        document.getElementById('resBody').innerText = body;
        resBox.style.display = 'block';
    }

    // Close suggestions on click outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) {
            suggBox.style.display = 'none';
        }
    });
</script>
