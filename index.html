<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Professional Engine</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --blue: #8ab4f8; --bg: #0b0b0b; --card: #1a1a1a; --text: #e8eaed; --border: #333; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* PROFESSIONAL AUTH SCREEN */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 20px; width: 380px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-card h2 { color: var(--blue); margin-bottom: 25px; font-weight: 500; }
        .auth-card input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: white; border-radius: 10px; font-size: 15px; transition: 0.3s; }
        .auth-card input:focus { border-color: var(--blue); outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: var(--blue); color: #000; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 16px; }

        /* BAN UI */
        #banOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; align-items: center; justify-content: center; z-index: 10001; text-align: center; }
        .ban-content { color: #ff4d4d; border: 1px solid #ff4d4d; padding: 50px; border-radius: 20px; background: #1a0000; }

        /* MAIN UI SYSTEM */
        #mainApp { display: none; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; border-bottom: 1px solid var(--border); }
        .search-row { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        .m-logo { font-size: 45px; font-weight: bold; color: #4285F4; margin-bottom: 30px; }
        .m-logo span { color: white; }
        .s-box { width: 100%; max-width: 600px; position: relative; }
        .s-input { width: 100%; padding: 16px 25px; border-radius: 30px; background: #202124; border: 1px solid #5f6368; color: white; font-size: 16px; outline: none; }
        
        /* SIDE PROFILE MENU */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 999; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; }
        #sideMenu.active { right: 0; }
        .p-avatar { width: 80px; height: 80px; background: var(--blue); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #000; font-weight: bold; }
        
        #resultsArea { padding: 0 10% 50px; }
    </style>
</head>
<body>

    <div id="banOverlay">
        <div class="ban-content">
            <h1 style="font-size: 50px; margin: 0;">ACCESS BANNED</h1>
            <p style="color:white; margin: 20px 0;">This Gmail ID has been blacklisted by Administrator Mehdi Hasan.</p>
            <button onclick="localStorage.clear(); location.reload();" style="background:#333; color:white; border:none; padding:12px 25px; border-radius:5px; cursor:pointer;">Try Another Account</button>
        </div>
    </div>

    <div id="authOverlay">
        <div class="auth-card">
            <h2>M-Search Login</h2>
            <input type="text" id="regName" placeholder="Enter Full Name">
            <input type="email" id="regEmail" placeholder="Official Gmail Address">
            <button class="auth-btn" id="loginBtn" onclick="handleAuth()">Verify & Enter</button>
            <p id="authMsg" style="font-size: 12px; margin-top: 15px; color: #888;"></p>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div style="font-size: 20px; font-weight: bold; color: var(--blue);">M Search</div>
            <div onclick="toggleMenu()" style="cursor:pointer; background:var(--card); padding:8px 15px; border-radius:20px; border:1px solid var(--border);">Profile &#9776;</div>
        </header>

        <div class="search-row">
            <div class="m-logo">M <span>Search</span></div>
            <div class="s-box">
                <input type="text" id="qInput" class="s-input" placeholder="Search the global knowledge engine..." onkeypress="if(event.key==='Enter') executeSearch()">
            </div>
        </div>

        <div id="resultsArea"></div>

        <div id="sideMenu">
            <div onclick="toggleMenu()" style="text-align:right; font-size:30px; cursor:pointer; margin-bottom:20px;">&times;</div>
            <div class="p-avatar" id="uLetter">U</div>
            <div style="text-align:center;">
                <h3 id="uName" style="margin:0; color:var(--blue);">User</h3>
                <p id="uEmail" style="color:gray; font-size:13px; margin:5px 0 20px;"></p>
                <div style="background:#000; padding:10px; border-radius:8px; font-size:11px;">
                    M-ID: <span id="uID" style="color:yellow;"></span>
                </div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" style="width:100%; margin-top:40px; padding:12px; background:transparent; border:1px solid #444; color:gray; border-radius:8px; cursor:pointer;">Sign Out</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY",
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "m-bot-server"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = () => {
            const savedEmail = localStorage.getItem("m_active_user");
            if(savedEmail) {
                const safeKey = savedEmail.replace(/\./g, ',');
                startMonitoring(safeKey);
            }
        };

        function handleAuth() {
            const name = document.getElementById("regName").value.trim();
            const email = document.getElementById("regEmail").value.trim().toLowerCase();
            const msg = document.getElementById("authMsg");

            if(!name || !email.endsWith("@gmail.com")) {
                msg.style.color = "#ff4d4d";
                msg.innerText = "Please provide an authentic @gmail.com address.";
                return;
            }

            const safeKey = email.replace(/\./g, ',');
            msg.style.color = "var(--blue)";
            msg.innerText = "Verifying with server...";

            // Check if account is banned BEFORE creating/entering
            db.ref('users/' + safeKey).once('value').then(snap => {
                const data = snap.val();
                if(data && data.status === "Banned") {
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("banOverlay").style.display = "flex";
                } else {
                    if(!data) {
                        // Create New Account
                        db.ref('users/' + safeKey).set({
                            name: name,
                            email: email,
                            status: "Active",
                            mID: "M-ENG-" + Math.floor(1000+Math.random()*9000)
                        });
                    }
                    localStorage.setItem("m_active_user", email);
                    startMonitoring(safeKey);
                }
            });
        }

        function startMonitoring(key) {
            db.ref('users/' + key).on('value', snap => {
                const user = snap.val();
                if(!user) return;

                if(user.status === "Banned") {
                    document.getElementById("mainApp").style.display = "none";
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("banOverlay").style.display = "flex";
                } else {
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("mainApp").style.display = "block";
                    document.getElementById("uName").innerText = user.name;
                    document.getElementById("uEmail").innerText = user.email;
                    document.getElementById("uID").innerText = user.mID;
                    document.getElementById("uLetter").innerText = user.name[0].toUpperCase();
                }
            });
        }

        async function executeSearch() {
            const q = document.getElementById("qInput").value.trim();
            if(!q) return;
            const area = document.getElementById("resultsArea");
            area.innerHTML = "<p style='color:gray;'>Indexing global web results...</p>";

            try {
                const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${q}&format=json&origin=*`);
                const data = await res.json();
                let html = `<h2 style='margin-bottom:30px;'>Results for: ${q}</h2>`;
                data.query.search.forEach(item => {
                    html += `<div style="margin-bottom:25px;">
                        <a href="https://en.wikipedia.org/wiki/${item.title}" target="_blank" style="color:var(--blue); font-size:19px; text-decoration:none; font-weight:500;">${item.title}</a>
                        <div style="color:#bdc1c6; font-size:14px; margin-top:5px; line-height:1.6;">${item.snippet}...</div>
                    </div>`;
                });
                area.innerHTML = html;
            } catch {
                area.innerHTML = "Search failed. Check connection.";
            }
        }

        function toggleMenu() { document.getElementById("sideMenu").classList.toggle("active"); }
    </script>
</body>
        </html>
