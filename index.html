<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M Search</title>
    <style>
        * { box-sizing: border-box; }
        body { margin:0; font-family: Arial, sans-serif; background:#0f0f0f; color:white; overflow-x:hidden; }
        .page { display:none; padding: 20px; min-height: 100vh; width: 100%; }
        .show { display: block; }
        #splash { position:fixed; inset:0; background:#0f0f0f; display:flex; justify-content:center; align-items:center; z-index:1000; }
        .logoCircle { width:100px; height:100px; border-radius:50%; background:#4285F4; display:flex; align-items:center; justify-content:center; font-size:50px; font-weight:bold; color:white; }
        .header { text-align:center; margin-top: 10vh; margin-bottom: 30px; }
        .header h1 { font-size: 45px; color: #4285F4; margin:0; }
        .search-pad { width:100%; height:55px; border-radius:30px; border:none; padding:0 20px; font-size:18px; background:#1f1f1f; color:white; outline:none; margin-bottom:15px; }
        .search-btn { width:100%; height:50px; border-radius:25px; border:none; font-size:18px; font-weight:bold; background:#4285F4; color:white; cursor:pointer; }
        .res-card { background:#1f1f1f; border-radius:15px; padding:20px; margin-top:15px; border: 1px solid #333; }
        .home-pill { background:#4285F4; color:white; padding:10px 20px; border-radius:20px; display:inline-block; margin-bottom:20px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

    <div id="splash"><div class="logoCircle">M</div></div>

    <div id="page1" class="page show">
        <div class="header"><h1>M Search</h1></div>
        <input class="search-pad" placeholder="Tap to search..." readonly onclick="goPage(2)">
    </div>

    <div id="page2" class="page">
        <div class="home-pill" onclick="goPage(1)">Home</div>
        <form onsubmit="event.preventDefault(); startSearch();">
            <input id="query" type="text" class="search-pad" placeholder="Type here..." autofocus>
            <button type="submit" class="search-btn">SEARCH</button>
        </form>
    </div>

    <div id="page3" class="page">
        <div class="home-pill" onclick="goPage(2)">← Back</div>
        <div id="answer"></div>
    </div>

    <script>
        const smartData = {
            "mgplc": { "Name": "M GROUP PLC", "Founder": "Mehdi Hasan" },
            "m search": { "About": "Mini Search Engine." }
        };

        function updateURL(q) {
            const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?q=' + encodeURIComponent(q);
            window.history.pushState({path:newurl},'',newurl);
        }

        function goPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
            document.getElementById('page' + n).classList.add('show');
        }

        async function startSearch() {
            let q = document.getElementById("query").value.trim();
            if(!q) return;

            updateURL(q);
            goPage(3);
            
            // IS LINE SE SEARCH BAR MEIN TEXT REH JAYEGA
            document.getElementById("query").value = q; 

            document.getElementById("answer").innerHTML = "Searching...";

            let resHTML = "";
            let key = q.toLowerCase();
            if(smartData[key]) {
                resHTML += `<div class="res-card"><h3>Smart Result</h3>`;
                for(let k in smartData[key]) { resHTML += `<p><b>${k}:</b> ${smartData[key][k]}</p>`; }
                resHTML += `</div>`;
            }

            try {
                const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                if(response.ok) {
                    const data = await response.json();
                    resHTML += `<div class="res-card"><h3>Wikipedia</h3><p>${data.extract}</p></div>`;
                }
            } catch(e) {}

            if(!resHTML) resHTML = "<div class='res-card'>No results found.</div>";
            document.getElementById("answer").innerHTML = resHTML;
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                // Jab page load ho, tab bar mein query daal do
                document.getElementById("query").value = q;
                startSearch();
            }
            setTimeout(() => { document.getElementById("splash").style.display="none"; }, 1500);
        };
    </script>
</body>
</html>
