<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Professional Engine</title>
    <style>
        :root {
            --blue: #4285F4;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --red: #d93025;
            --border: #333;
        }

        body.light-mode {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #202124;
            --border: #dadce0;
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }

        header {
            display: flex;
            align-items: center;
            padding: 15px 5%;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 28px; font-weight: bold; color: var(--blue); cursor: pointer; text-decoration: none; margin-right: 20px; }
        .logo span { color: var(--text); font-size: 18px; margin-left: 5px; }

        .search-container { flex: 1; max-width: 600px; }
        .search-input {
            width: 100%;
            height: 45px;
            border-radius: 24px;
            border: 1px solid #5f6368;
            background: var(--card);
            color: var(--text);
            padding: 0 20px;
            font-size: 16px;
            outline: none;
        }

        .tabs { display: flex; gap: 20px; padding: 10px 5% 0 140px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .tab { padding-bottom: 10px; cursor: pointer; color: #9aa0a6; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

        main { padding: 20px 5% 40px 140px; max-width: 900px; }

        /* Story / History System */
        .history-box { margin-top: 40px; background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .history-tag {
            background: #303134;
            color: var(--blue);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid #444;
        }
        .history-tag:hover { background: var(--blue); color: white; }

        /* Red Clear Button */
        .clear-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        /* Smart MGPLC Result Card */
        .smart-card {
            background: var(--blue);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        .res-item { margin-bottom: 30px; }
        .res-title { font-size: 20px; color: var(--blue); text-decoration: none; font-weight: 500; }
        .res-snippet { font-size: 14px; color: #bdc1c6; margin-top: 5px; }

        @media (max-width: 800px) {
            header { flex-direction: column; padding: 15px; }
            .tabs { padding: 10px; justify-content: center; }
            main { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">M <span>Search</span></div>
        <div class="search-container">
            <form onsubmit="event.preventDefault(); triggerSearch('web');">
                <input id="qInp" type="text" class="search-input" placeholder="Search MGPLC or Web..." autocomplete="off">
            </form>
        </div>
        <button onclick="document.body.classList.toggle('light-mode')" style="background:none; border:none; cursor:pointer; font-size:20px; margin-left:15px;">🌓</button>
    </header>

    <div class="tabs">
        <div id="t-web" class="tab active" onclick="triggerSearch('web')">All Results</div>
        <div id="t-img" class="tab" onclick="triggerSearch('images')">Images</div>
        <div id="t-vid" class="tab" onclick="triggerSearch('videos')">Videos</div>
    </div>

    <main id="mainContent">
        <div id="homeView">
            <h1 style="font-size: 45px; color: var(--blue); margin-top: 60px;">M Search Pro</h1>
            <p style="color: #9aa0a6;">The professional search engine by MGPLC.</p>

            <div class="history-box">
                <div class="history-header">
                    <h3 style="margin:0;">Recent History</h3>
                    <button class="clear-btn" onclick="clearHistory()">CLEAR HISTORY</button>
                </div>
                <div id="historyList" class="history-list">
                    </div>
            </div>
        </div>

        <div id="resultsView" style="display:none;"></div>
    </main>

    <script>
        // --- PERMANENT DATA (MGPLC & M SEARCH) ---
        const privateDatabase = {
            "mgplc": {
                "name": "M Group PLC (MGPLC)",
                "description": "MGPLC is a global professional organization dedicated to advanced search algorithms and digital ecosystem development.",
                "founder": "Mehdi Hasan",
                "founded": "2026"
            },
            "m search": {
                "name": "M Search Engine",
                "description": "M Search is a high-speed, secure, and professional search engine designed for high-performance browsing.",
                "status": "Official Pro Version"
            }
        };

        function saveToHistory(q) {
            let h = JSON.parse(localStorage.getItem("search_history") || "[]");
            if(!h.includes(q)) {
                h.unshift(q);
                localStorage.setItem("search_history", JSON.stringify(h.slice(0, 10)));
            }
            displayHistory();
        }

        function displayHistory() {
            const h = JSON.parse(localStorage.getItem("search_history") || "[]");
            const list = document.getElementById("historyList");
            list.innerHTML = h.length ? "" : "<p style='color:#666;'>History is clean.</p>";
            h.forEach(item => {
                const tag = document.createElement("div");
                tag.className = "history-tag";
                tag.innerText = item;
                tag.onclick = () => { document.getElementById("qInp").value = item; triggerSearch('web'); };
                list.appendChild(tag);
            });
        }

        function clearHistory() {
            localStorage.removeItem("search_history");
            displayHistory();
        }

        async function triggerSearch(type) {
            const query = document.getElementById("qInp").value.trim().toLowerCase();
            if(!query) return;

            saveToHistory(query);
            document.getElementById("homeView").style.display = "none";
            const view = document.getElementById("resultsView");
            view.style.display = "block";
            view.innerHTML = "<p>Loading Results...</p>";

            // UI Tab Toggle
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + (type === 'web' ? 'web' : type === 'images' ? 'img' : 'vid')).classList.add('active');

            let html = "";

            // 1. Check if it's MGPLC or M Search (Private Data)
            if (privateDatabase[query]) {
                const data = privateDatabase[query];
                html += `<div class="smart-card">
                    <small>OFFICIAL DATABASE RECORD</small>
                    <h2>${data.name}</h2>
                    <p>${data.description}</p>
                    ${data.founder ? `<p><b>Founder:</b> ${data.founder}</p>` : ""}
                </div>`;
            }

            // 2. Wikipedia Search (General Web)
            try {
                const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${query}&format=json&origin=*`);
                const wikiData = await res.json();
                wikiData.query.search.forEach(item => {
                    html += `<div class="res-item">
                        <a href="https://en.wikipedia.org/wiki/${item.title}" target="_blank" class="res-title">${item.title}</a>
                        <p class="res-snippet">${item.snippet}...</p>
                    </div>`;
                });
                view.innerHTML = html || "No records found.";
            } catch(e) {
                view.innerHTML = html + "<p>Unable to fetch additional web results.</p>";
            }
        }

        window.onload = displayHistory;
    </script>
</body>
                    </html>
