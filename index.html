<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Professional Engine</title>
    <style>
        :root {
            --blue: #4285F4;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --red: #d93025;
        }

        body.light-mode {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #202124;
            --red: #d93025;
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }

        /* Main Header */
        header {
            display: flex;
            align-items: center;
            padding: 15px 5%;
            background: var(--bg);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 28px; font-weight: bold; color: var(--blue); cursor: pointer; text-decoration: none; margin-right: 20px; }
        .logo span { color: var(--text); font-size: 20px; margin-left: 5px; }

        .search-container { flex: 1; max-width: 600px; position: relative; }
        .search-input {
            width: 100%;
            height: 45px;
            border-radius: 24px;
            border: 1px solid #5f6368;
            background: var(--card);
            color: var(--text);
            padding: 0 20px;
            font-size: 16px;
            outline: none;
        }

        /* Tabs Section */
        .tabs { display: flex; gap: 20px; padding: 10px 5% 0 140px; border-bottom: 1px solid #333; font-size: 14px; }
        .tab { padding-bottom: 10px; cursor: pointer; color: #9aa0a6; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

        /* Dashboard & Results Area */
        main { padding: 20px 5% 40px 140px; max-width: 900px; }

        /* Search History Style (The "Story" System) */
        .history-box { margin-top: 40px; background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .history-tag {
            background: #303134;
            color: var(--blue);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid #444;
        }
        .history-tag:hover { background: var(--blue); color: white; }

        /* The Red Clear Button you wanted */
        .clear-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .clear-btn:hover { opacity: 0.8; }

        /* Mode Switcher */
        .mode-btn { margin-left: 15px; cursor: pointer; font-size: 20px; background: none; border: none; color: var(--text); }

        /* Result Items */
        .res-item { margin-bottom: 30px; animation: fadeIn 0.4s; }
        .res-title { font-size: 19px; color: var(--blue); text-decoration: none; font-weight: 500; }
        .res-snippet { font-size: 14px; color: #bdc1c6; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 800px) {
            header { flex-direction: column; padding: 15px; }
            .tabs { padding: 10px; justify-content: center; }
            main { padding: 20px; }
            .logo { margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">M <span>Search</span></div>
        <div class="search-container">
            <form onsubmit="event.preventDefault(); startSearch('web');">
                <input id="qInp" type="text" class="search-input" placeholder="Search anything..." autocomplete="off">
            </form>
        </div>
        <button class="mode-btn" onclick="toggleMode()">🌓</button>
    </header>

    <div class="tabs">
        <div id="t-web" class="tab active" onclick="startSearch('web')">All Results</div>
        <div id="t-img" class="tab" onclick="startSearch('images')">Images</div>
        <div id="t-vid" class="tab" onclick="startSearch('videos')">Videos</div>
    </div>

    <main id="mainArea">
        <div id="dashboard">
            <h1 style="font-size: 50px; color: var(--blue); margin-top: 50px;">Welcome to M Search</h1>
            <p style="color: #9aa0a6;">Professional database connected with MGPLC systems.</p>

            <div class="history-box">
                <div class="history-header">
                    <h3 style="margin:0;">Recent Searches</h3>
                    <button class="clear-btn" onclick="clearMyHistory()">CLEAR HISTORY</button>
                </div>
                <div id="historyContainer" class="history-list">
                    </div>
            </div>
        </div>

        <div id="resultsContent" style="display:none;">
            </div>
    </main>

    <script>
        // --- Smart History & Storage ---
        function saveQuery(q) {
            let h = JSON.parse(localStorage.getItem("m_history") || "[]");
            if(!h.includes(q)) {
                h.unshift(q);
                localStorage.setItem("m_history", JSON.stringify(h.slice(0, 12)));
            }
            renderHistory();
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem("m_history") || "[]");
            const container = document.getElementById("historyContainer");
            container.innerHTML = h.length ? "" : "<p style='color:#666;'>No history yet.</p>";
            h.forEach(item => {
                const tag = document.createElement("div");
                tag.className = "history-tag";
                tag.innerText = item;
                tag.onclick = () => { document.getElementById("qInp").value = item; startSearch('web'); };
                container.appendChild(tag);
            });
        }

        function clearMyHistory() {
            localStorage.removeItem("m_history");
            renderHistory();
        }

        // --- Theme Switcher ---
        function toggleMode() {
            document.body.classList.toggle("light-mode");
        }

        // --- Search Logic ---
        async function startSearch(type) {
            const q = document.getElementById("qInp").value.trim();
            if(!q) return;

            saveQuery(q);
            document.getElementById("dashboard").style.display = "none";
            const resArea = document.getElementById("resultsContent");
            resArea.style.display = "block";
            resArea.innerHTML = "<p>Loading professional results...</p>";

            // Tab UI update
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + (type === 'web' ? 'web' : type === 'images' ? 'img' : 'vid')).classList.add('active');

            try {
                if (type === 'web') {
                    // mgplc Smart Data Check
                    let smartResult = "";
                    if(q.toLowerCase() === "mgplc") {
                        smartResult = `<div style="background:var(--blue); color:white; padding:20px; border-radius:12px; margin-bottom:20px;">
                            <h2>M Group PLC (MGPLC)</h2>
                            <p>Official database result: Leading digital innovation and search architecture company.</p>
                        </div>`;
                    }

                    const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${q}&format=json&origin=*`);
                    const data = await res.json();
                    let html = smartResult;
                    data.query.search.forEach(item => {
                        html += `<div class="res-item">
                            <a href="https://en.wikipedia.org/wiki/${item.title}" target="_blank" class="res-title">${item.title}</a>
                            <p class="res-snippet">${item.snippet}...</p>
                        </div>`;
                    });
                    resArea.innerHTML = html;
                } else {
                    resArea.innerHTML = `<p>Results for ${type} are loading within the main page frame.</p>`;
                }
            } catch(e) {
                resArea.innerHTML = "<p>Connection error. Please try again.</p>";
            }
        }

        // Initial Setup
        window.onload = renderHistory;
    </script>
</body>
    </html>
