<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Full Engine</title>
    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }
        
        /* Header */
        header { display: flex; align-items: center; padding: 15px 5%; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; color: #4285F4; text-decoration: none; margin-right: 25px; cursor: pointer; }
        .logo span { color: white; }
        .search-box { flex: 1; max-width: 600px; }
        .search-input { width: 100%; height: 44px; border-radius: 22px; border: 1px solid #5f6368; background: #202124; color: white; padding: 0 20px; outline: none; }

        /* Tabs */
        .tabs { display: flex; gap: 20px; padding: 10px 5% 0 150px; font-size: 14px; color: #9aa0a6; border-bottom: 1px solid #333; }
        .tab { padding-bottom: 10px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

        /* Results Area */
        main { padding: 20px 5% 40px 150px; max-width: 900px; }
        .res-item { margin-bottom: 30px; }
        .res-title { font-size: 20px; color: var(--blue); text-decoration: none; display: block; margin-bottom: 5px; }
        .res-snippet { font-size: 14px; color: #bdc1c6; line-height: 1.5; }
        
        /* Image Grid */
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .img-card img { width: 100%; border-radius: 8px; border: 1px solid #333; }
        .img-card p { font-size: 12px; color: #9aa0a6; margin-top: 5px; }

        @media (max-width: 800px) {
            header { flex-direction: column; }
            .tabs { padding: 10px; justify-content: center; }
            main { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href=window.location.pathname">M <span>Search</span></div>
        <div class="search-box">
            <form onsubmit="event.preventDefault(); search('web');">
                <input id="qInput" type="text" class="search-input" placeholder="Search anything...">
            </form>
        </div>
    </header>

    <div class="tabs">
        <div id="tab-web" class="tab active" onclick="search('web')">All</div>
        <div id="tab-img" class="tab" onclick="search('images')">Images</div>
        <div id="tab-vid" class="tab" onclick="search('videos')">Videos</div>
    </div>

    <main id="resultsArea"></main>

    <script>
        async function search(type) {
            const query = document.getElementById("qInput").value.trim();
            if(!query) return;

            // UI Update
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + (type === 'web' ? 'web' : type === 'images' ? 'img' : 'vid')).classList.add('active');
            
            const area = document.getElementById("resultsArea");
            area.innerHTML = "Searching...";

            if (type === 'web') {
                // WEB RESULTS (Mix of Wikipedia & DuckDuckGo)
                let wiki = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${query}&format=json&origin=*`).then(r => r.json());
                let html = "";
                wiki.query.search.forEach(item => {
                    html += `<div class="res-item">
                        <a href="https://en.wikipedia.org/wiki/${item.title}" class="res-title">${item.title}</a>
                        <p class="res-snippet">${item.snippet}...</p>
                    </div>`;
                });
                area.innerHTML = html;
            } 
            else if (type === 'images') {
                // IMAGES (Redirect to Bing Images for best experience)
                area.innerHTML = `<div class="res-item">
                    <h3>Images for "${query}"</h3>
                    <p>Redirecting to M-Image Database (Bing Powered)...</p>
                    <a href="https://www.bing.com/images/search?q=${encodeURIComponent(query)}" target="_blank" style="color:#8ab4f8; font-weight:bold;">Click here to see all images →</a>
                </div>`;
                window.open(`https://www.bing.com/images/search?q=${encodeURIComponent(query)}`, '_blank');
            }
            else if (type === 'videos') {
                // VIDEOS (Direct YouTube Search)
                area.innerHTML = `<div class="res-item">
                    <h3>Videos for "${query}"</h3>
                    <p>Fetching videos from YouTube & Bing Video Database...</p>
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(query)}" target="_blank" style="color:#8ab4f8; font-weight:bold;">Watch videos on YouTube →</a>
                </div>`;
                window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`, '_blank');
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.get('q')) {
                document.getElementById("qInput").value = params.get('q');
                search('web');
            }
        };
    </script>
</body>
</html>
