<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Bing Powered</title>
    
    <link rel="icon" type="image/png" href="https://via.placeholder.com/32/4285F4/FFFFFF?text=M">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/4285F4/FFFFFF?text=M">

    <style>
        :root {
            --bing-blue: #0078d4;
            --bg-dark: #0f0f0f;
            --card-bg: #1b1b1b;
            --text-main: #e8eaed;
            --text-dim: #9aa0a6;
            --link-color: #8ab4f8;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        /* Header & Search Bar */
        header {
            display: flex;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid #333;
            background: var(--bg-dark);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: var(--bing-blue);
            text-decoration: none;
            margin-right: 40px;
        }

        .search-box {
            flex: 1;
            max-width: 700px;
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            border: 1px solid #5f6368;
            background: #202124;
            color: white;
            padding: 0 25px;
            font-size: 16px;
            outline: none;
            transition: box-shadow 0.2s;
        }

        .search-input:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: transparent;
            background: #303134;
        }

        /* Tabs like Bing/Google */
        .tabs {
            display: flex;
            gap: 25px;
            padding: 10px 5% 0 160px;
            font-size: 14px;
            color: var(--text-dim);
            border-bottom: 1px solid #333;
        }

        .tab {
            padding-bottom: 12px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--link-color);
            border-bottom-color: var(--link-color);
        }

        /* Results Layout */
        main {
            padding: 20px 5% 40px 160px;
            max-width: 1000px;
        }

        .result-item {
            margin-bottom: 35px;
            animation: slideUp 0.4s ease-out;
        }

        .result-url {
            font-size: 13px;
            color: #bdc1c6;
            margin-bottom: 5px;
            display: block;
        }

        .result-title {
            font-size: 20px;
            color: var(--link-color);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 8px;
        }

        .result-title:hover { text-decoration: underline; }

        .result-snippet {
            font-size: 15px;
            color: #bdc1c6;
            line-height: 1.6;
        }

        /* Featured Answer Box */
        .featured-box {
            background: var(--card-bg);
            border: 1px solid #3c4043;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 40px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile View */
        @media (max-width: 850px) {
            header { flex-direction: column; padding: 15px; }
            .logo { margin: 0 0 15px 0; }
            .tabs { padding: 10px 20px; justify-content: center; }
            main { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="location.href=window.location.pathname">M</a>
        <div class="search-box">
            <form onsubmit="event.preventDefault(); startProfessionalSearch();">
                <input id="qInput" type="text" class="search-input" placeholder="Ask M Search or Bing..." autocomplete="off">
            </form>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active">All</div>
        <div class="tab">Images</div>
        <div class="tab">Videos</div>
        <div class="tab">News</div>
    </div>

    <main id="resultsArea">
        <div style="text-align:center; margin-top:100px;">
            <h1 style="font-size:70px; color:var(--bing-blue); margin:0;">M</h1>
            <p style="color:var(--text-dim); font-size:18px;">Connecting you to the global web via Bing & Wikipedia</p>
        </div>
    </main>

    <script>
        // 1. URL Update & Browser History
        function updateAddressBar(query) {
            const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?q=' + encodeURIComponent(query);
            window.history.pushState({path:newurl}, '', newurl);
        }

        // 2. Main Search Function
        async function startProfessionalSearch() {
            const query = document.getElementById("qInput").value.trim();
            if(!query) return;

            updateAddressBar(query);
            const resultsArea = document.getElementById("resultsArea");
            resultsArea.innerHTML = "<p style='color:#9aa0a6;'>Fetching the best results...</p>";

            try {
                // Fetching from two major sources
                const bingMirror = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&origin=*`;
                const wikiSource = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;

                const [bingData, wikiData] = await Promise.all([
                    fetch(bingMirror).then(res => res.json()),
                    fetch(wikiSource).then(res => res.json())
                ]);

                let finalHTML = "";

                // FEATURED ANSWER (Bing/DDG Style)
                if(bingData.AbstractText) {
                    finalHTML += `
                    <div class="featured-box">
                        <div style="color:var(--text-dim); font-size:12px; font-weight:bold; margin-bottom:10px;">QUICK SUMMARY</div>
                        <h2 style="margin:0 0 10px 0; color:#fff;">${bingData.Heading}</h2>
                        <p class="result-snippet" style="font-size:16px;">${bingData.AbstractText}</p>
                        <a href="${bingData.AbstractURL}" target="_blank" style="color:var(--link-color); font-size:14px; text-decoration:none;">Read more on ${bingData.AbstractSource} →</a>
                    </div>`;
                }

                // WEB RESULTS (Wikipedia Intelligence)
                if(wikiData.query && wikiData.query.search.length > 0) {
                    wikiData.query.search.forEach(result => {
                        finalHTML += `
                        <div class="result-item">
                            <span class="result-url">https://en.wikipedia.org › wiki › ${result.title.replace(/ /g, '_')}</span>
                            <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(result.title)}" target="_blank" class="result-title">${result.title}</a>
                            <p class="result-snippet">${result.snippet}...</p>
                        </div>`;
                    });
                }

                // FOOTER: LINK TO DIRECT BING
                finalHTML += `
                <div style="margin-top:50px; padding:20px; border-top:1px solid #333; text-align:center;">
                    <p style="color:var(--text-dim);">Not finding what you need?</p>
                    <a href="https://www.bing.com/search?q=${encodeURIComponent(query)}" target="_blank" 
                       style="background:var(--bing-blue); color:white; padding:10px 25px; border-radius:20px; text-decoration:none; font-weight:bold;">
                       See more results on Bing
                    </a>
                </div>`;

                resultsArea.innerHTML = finalHTML;

            } catch (err) {
                resultsArea.innerHTML = "<p>Database connection timed out. Please try again.</p>";
            }
        }

        // 3. Handle Auto-Search from URL
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                document.getElementById("qInput").value = q;
                startProfessionalSearch();
            }
        };
    </script>
</body>
</html>
