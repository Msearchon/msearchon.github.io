<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M Search</title>
    <style>
        /* AAPKA ORIGINAL DESIGN */
        * { box-sizing: border-box; }
        body { margin:0; font-family: Arial, sans-serif; background:#0f0f0f; color:white; overflow-x:hidden; transition: 0.3s; }
        body.light { background:#f4f7fb; color:black; }
        
        #splash { position:fixed; inset:0; background:#0f0f0f; display:flex; justify-content:center; align-items:center; z-index:1000; }
        .logoCircle { width:120px; height:120px; border-radius:50%; background:#4285F4; display:flex; align-items:center; justify-content:center; font-size:60px; font-weight:bold; color:white; }

        .page { display:none; padding: 22px; width: 100%; min-height: 100vh; }
        .show { display: block; }

        .header { text-align:center; margin-top: 15vh; margin-bottom: 35px; }
        .header h1 { font-size: 50px; font-weight: bold; margin: 0; color: #4285F4; }

        .search-pad { width:100%; height:58px; border-radius:30px; border: none; padding:0 25px; font-size:20px; background:#1f1f1f; color:white; outline:none; }
        body.light .search-pad { background:white; color:black; border:1px solid #ddd; }
        
        .search-btn { width:100%; height:55px; margin-top:15px; border-radius:30px; border:none; font-size:18px; font-weight: bold; background:#4285F4; color:white; cursor:pointer; }

        .home-pill { display: flex; align-items: center; gap: 12px; background: #4285F4; color: white; width: fit-content; padding: 10px 25px; border-radius: 50px; margin-bottom: 25px; cursor: pointer; }
        
        .big-box, .res-card { background:#1f1f1f; border-radius:20px; padding:20px; margin-top:15px; }
        body.light .big-box, body.light .res-card { background:white; color:black; border:1px solid #ddd; }
        
        .res-row { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .res-label { color: #8ab4f8; font-size: 12px; font-weight: bold; text-transform: uppercase; }

        #menuBtn { position:fixed; top:15px; right:15px; font-size:28px; z-index: 101; cursor:pointer; }
        #menuBox { position:fixed; top:55px; right:15px; background:#1f1f1f; border-radius:10px; padding:10px; display:none; z-index: 102; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="splash"><div class="logoCircle">M</div></div>
    <div id="menuBtn" onclick="toggleMenu()">⋮</div>

    <div id="menuBox">
        <div style="padding:10px; cursor:pointer;" onclick="toggleMode()">Switch Mode</div>
    </div>

    <div id="page1" class="page show">
        <div class="header"><h1>M Search</h1></div>
        <input class="search-pad" placeholder="Search on M search..." readonly onclick="goPage(2)">
        <div class="big-box"><h2>Welcome</h2><p>M Search is ready.</p></div>
    </div>

    <div id="page2" class="page">
        <div class="home-pill" onclick="goPage(1)"><span>Home</span></div>
        <form onsubmit="event.preventDefault(); startSearch();">
            <input id="query" type="text" class="search-pad" placeholder="Type and Search..." autofocus>
            <button type="submit" class="search-btn">SEARCH</button>
        </form>
    </div>

    <div id="page3" class="page">
        <div class="home-pill" onclick="goPage(2)"><span>← Back</span></div>
        <div id="answer"></div>
    </div>

    <script>
        const smartData = {
            "mgplc": { "name": "M GROUP PLC", "founder": "Mehdi Hasan", "about": "Parent company." },
            "m search": { "about": "Mini search engine.", "owner": "MGPLC" }
        };

        function updateURL(q) {
            const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?q=' + encodeURIComponent(q);
            window.history.pushState({path:newurl},'',newurl);
        }

        function goPage(n) {
            document.querySelectorAll(".page").forEach(p => p.classList.remove("show"));
            const target = document.getElementById("page" + n);
            if(target) target.classList.add("show");
            document.getElementById("menuBox").style.display="none";
        }

        function toggleMenu() {
            let m = document.getElementById("menuBox");
            m.style.display = m.style.display === "block" ? "none" : "block";
        }

        function toggleMode() { document.body.classList.toggle("light"); toggleMenu(); }

        async function startSearch() {
            let q = document.getElementById("query").value.trim().toLowerCase();
            if(!q) return;

            // Page Change and URL Update
            goPage(3);
            updateURL(q);
            document.getElementById("answer").innerHTML = "<h2>Searching...</h2>";

            let html = "";

            // Local Data
            if(smartData[q]) {
                html += `<div class="res-card">`;
                for(let key in smartData[q]) {
                    html += `<div class="res-row"><div class="res-label">${key}</div><div>${smartData[q][key]}</div></div>`;
                }
                html += `</div>`;
            }

            // Wikipedia
            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                if(res.ok) {
                    const d = await res.json();
                    html += `<div class="res-card"><h3>Wikipedia</h3><p>${d.extract}</p></div>`;
                }
            } catch(e) {}

            if(!html) html = "<div class='res-card'>No results found.</div>";
            document.getElementById("answer").innerHTML = html;
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                document.getElementById("query").value = q;
                startSearch();
            }
            setTimeout(() => document.getElementById("splash").style.display="none", 1500);
        };
    </script>
</body>
</html>
