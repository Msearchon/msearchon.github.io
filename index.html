<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Search</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

#splashLogo{
font-size:52px;
font-weight:bold;
}

#splashLogo span{ color:#4285F4; }

/* COMMON */
.page{ display:none; padding:22px; }
.show{ display:block; }

/* HEADER */
.header{
text-align:center;
margin-top:40px;
}

.header h1{
font-size:48px;
margin-bottom:35px;
}

/* SEARCH BAR */
.search-pad{
width:100%;
height:64px;
border-radius:40px;
border:none;
padding:0 26px;
font-size:22px;
background:#1f1f1f;
color:white;
outline:none;
}

/* BUTTON */
.search-btn{
width:100%;
height:56px;
margin-top:20px;
border-radius:35px;
border:none;
font-size:20px;
background:#4285F4;
color:white;
cursor:pointer;
}

/* BIG BOXES */
.big-box{
background:#1f1f1f;
border-radius:20px;
padding:26px;
margin-top:22px;
}

.big-box h2{
font-size:24px;
margin:0 0 10px;
}

.big-box p{
font-size:18px;
color:#ccc;
}

/* HISTORY */
.history{ margin-top:20px; }

.history-item{
padding:10px;
font-size:16px;
color:#aaa;
cursor:pointer;
}

/* PAGE BUTTONS */
.page-buttons{
display:flex;
gap:10px;
margin-bottom:10px;
}

.page-btn{
flex:1;
height:45px;
border:none;
border-radius:10px;
background:#4285F4;
color:white;
font-size:16px;
cursor:pointer;
}

/* MENU */
#menuBtn{
position:absolute;
top:15px;
right:15px;
font-size:28px;
cursor:pointer;
}

#menuBox{
position:absolute;
top:55px;
right:15px;
background:#1f1f1f;
border-radius:10px;
padding:10px;
display:none;
}

.menu-item{
padding:10px;
cursor:pointer;
}

/* HISTORY PAGE */
#historyPage{
position:fixed;
inset:0;
background:#0f0f0f;
padding:20px;
display:none;
z-index:999;
}

#clearBtn{
background:green;
color:white;
border:none;
padding:10px;
margin-top:20px;
width:100%;
}

#closeHistory{
position:absolute;
top:15px;
right:20px;
font-size:26px;
cursor:pointer;
}

/* LIGHT MODE */
.light{
background:linear-gradient(180deg,#f4f7fb,#e9eef5);
color:#1a1a1a;
}

.light .search-pad{
background:#ffffff;
color:#111;
border:2px solid #d0d9e5;
}

.light .big-box{
background:#ffffff;
color:#1a1a1a;
}

.light #menuBox{
background:#ffffff;
color:#111;
}

.light #historyPage{
background:#eef3f9;
color:#1b1f24;
}

</style>
</head>

<body>

<div id="splash">
<div id="splashLogo"> M <span>Search</span></div>
</div>

<div id="menuBtn" onclick="toggleMenu()">⋮</div>

<div id="menuBox">
<div class="menu-item" onclick="openHistory()">History</div>
<div class="menu-item" onclick="toggleMode()">Mode</div>
</div>

<div id="historyPage">
<div id="closeHistory" onclick="closeHistory()">✕</div>
<h2>History</h2>
<div id="fullHistory"></div>
<button id="clearBtn" onclick="clearHistory()">Clear History</button>
</div>

<div id="page1" class="page show">
<div class="header">
<h1>M Search</h1>
</div>

<input class="search-pad" placeholder="Search on M Search" onclick="goPage(2)">

<div class="big-box">
<h2>Important Rules</h2>
<p>When you open M Search, refresh it once.</p>
</div>

<div class="big-box">
<h2>News 📊</h2>
<p>A simple And fast search built in 2023.</p>
</div>

<div class="big-box">
<h2>🌐 M SEARCH</h2>
<p>ALL File information.</p>
</div>

</div>

<div id="page2" class="page">

<div class="page-buttons">
<button class="page-btn" onclick="goPage(1)">Home</button>
<button class="page-btn" onclick="goPage(3)">Result</button>
</div>

<input id="query" class="search-pad" placeholder="Search">

<button class="search-btn" onclick="search()">Search</button>

<div class="history" id="history"></div>

</div>

<div id="page3" class="page">

<h2>M Search Result</h2>

<p style="font-size:20px">
<b>Answer:</b>
<span id="answer">Loading...</span>
</p>

<button class="search-btn" onclick="goBack()">Back</button>

</div>

<script>

/* BASIC DATA */
const data={
"what is python":"Python is a programming language.",
"what is google":"Google is a search engine."
};

let smartData={};
let smartLoaded=false;
let selectedQuestion="";
let historyList=[];

/* LOAD JSON */
fetch("./smart-data.json")
.then(res=>res.json())
.then(json=>{
smartData=json;
smartLoaded=true;
console.log("Smart JSON loaded");
})
.catch(err=>{
console.log("JSON load error:",err);
});

/* SEARCH ENGINE */
function getSmartAnswer(q){

q=q.toLowerCase().trim();

if(!smartData.entities) return "Search system not ready";

for(let name in smartData.entities){

let entity=smartData.entities[name];
let props=entity.properties;

/* match name */
if(q.includes(name)){

for(let key in props){

if(q.includes(key.replace(/_/g," "))){
return props[key];
}

}

if(props.about) return props.about;

}

/* match aliases */
if(entity.aliases){

for(let alias of entity.aliases){

if(q.includes(alias)){

for(let key in props){

if(q.includes(key.replace(/_/g," "))){
return props[key];
}

}

if(props.about) return props.about;

}

}

}

}

return "Answer not found";

}

/* SEARCH FUNCTION */
function search(){

let q=document.getElementById("query").value;

if(q==="") return;

if(!smartLoaded){

document.getElementById("answer").innerText="Loading data, please wait...";
goPage(3);

setTimeout(()=>{
document.getElementById("answer").innerText=getSmartAnswer(q);
},1000);

return;

}

document.getElementById("answer").innerText=getSmartAnswer(q);

goPage(3);

}

/* PAGE CONTROL */
function goPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById("page"+n).classList.add("show");
}

function goBack(){
goPage(2);
}

/* MENU */
function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display=m.style.display==="block"?"none":"block";
}

function toggleMode(){
document.body.classList.toggle("light");
}

function openHistory(){
document.getElementById("historyPage").style.display="block";
}

function closeHistory(){
document.getElementById("historyPage").style.display="none";
}

function clearHistory(){
localStorage.removeItem("m_history");
}

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},2000);

</script>

</body>
  </html>
