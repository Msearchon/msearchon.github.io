<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Search</title>

<style>
/* YOUR ORIGINAL STYLE — UNCHANGED */
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

#splash{
position:fixed;
inset:0;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

#splashLogo{
font-size:52px;
font-weight:bold;
}

#splashLogo span{ color:#4285F4; }

.page{ display:none; padding:22px; }
.show{ display:block; }

.header{
text-align:center;
margin-top:40px;
}

.header h1{
font-size:48px;
margin-bottom:35px;
}

.search-pad{
width:100%;
height:64px;
border-radius:40px;
border:none;
padding:0 26px;
font-size:22px;
background:#1f1f1f;
color:white;
outline:none;
}

.search-btn{
width:100%;
height:56px;
margin-top:20px;
border-radius:35px;
border:none;
font-size:20px;
background:#4285F4;
color:white;
cursor:pointer;
}

.big-box{
background:#1f1f1f;
border-radius:20px;
padding:26px;
margin-top:22px;
}

.big-box h2{
font-size:24px;
margin:0 0 10px;
}

.big-box p{
font-size:18px;
color:#ccc;
}

.history{ margin-top:20px; }

.history-item{
padding:10px;
font-size:16px;
color:#aaa;
cursor:pointer;
}

.page-buttons{
display:flex;
gap:10px;
margin-bottom:10px;
}

.page-btn{
flex:1;
height:45px;
border:none;
border-radius:10px;
background:#4285F4;
color:white;
font-size:16px;
cursor:pointer;
}

#menuBtn{
position:absolute;
top:15px;
right:15px;
font-size:28px;
cursor:pointer;
}

#menuBox{
position:absolute;
top:55px;
right:15px;
background:#1f1f1f;
border-radius:10px;
padding:10px;
display:none;
}

.menu-item{
padding:10px;
cursor:pointer;
}

#historyPage{
position:fixed;
inset:0;
background:#0f0f0f;
padding:20px;
display:none;
z-index:999;
}

#clearBtn{
background:green;
color:white;
border:none;
padding:10px;
margin-top:20px;
width:100%;
}

#closeHistory{
position:absolute;
top:15px;
right:20px;
font-size:26px;
cursor:pointer;
}

.light{
background:linear-gradient(180deg,#f4f7fb,#e9eef5);
color:#1a1a1a;
}
</style>
</head>

<body>

<div id="splash">
<div id="splashLogo"> M <span> Search </span></div>
</div>

<div id="menuBtn" onclick="toggleMenu()">⋮</div>

<div id="menuBox">
<div class="menu-item" onclick="openHistory()">History</div>
<div class="menu-item" onclick="toggleMode()">Mode</div>
</div>

<div id="historyPage">
<div id="closeHistory" onclick="closeHistory()">✕</div>
<h2>History</h2>
<div id="fullHistory"></div>
<button id="clearBtn" onclick="clearHistory()">Clear History</button>
</div>

<div id="page1" class="page show">
<div class="header">
<h1>M Search</h1>
</div>

<input class="search-pad" placeholder="Search on M Search" onclick="goPage(2)">

<div class="big-box">
<h2>Important Rules</h2>
<p>When you open M Search, refresh it once.</p>
</div>

<div class="big-box">
<h2>News 📊</h2>
<p>A simple And fast search built in 2023.</p>
</div>

<div class="big-box">
<h2>🌐 M SEARCH</h2>
<p>ALL File information.</p>
</div>
</div>

<div id="page2" class="page">

<div class="page-buttons">
<button class="page-btn" onclick="goPage(1)">Home</button>
<button class="page-btn" onclick="goPage(3)">Result</button>
</div>

<input id="query" class="search-pad" placeholder="Search">

<button class="search-btn" onclick="search()">Search</button>

<div class="history" id="history"></div>

</div>

<div id="page3" class="page">

<h2>M Search Result</h2>

<p style="font-size:20px">
<b>Answer:</b>
<span id="answer">System loading...</span>
</p>

<button class="search-btn" onclick="goBack()">Back</button>

</div>

<script>

/* ORIGINAL DATA */
const data={
"what is python":"Python is a programming language.",
"what is google":"Google is a search engine.",
"what is computer":"A computer is an electronic machine.",
"what is m search":"M search is a mini search engine.",
"who is m.h":"M.H is founder of M Search All.",
"who create m search":"M.H created m search in 2023.",
"tell me what is miraz":"Miraz is a #️⃣."
};

let selectedQuestion="";
let historyList=[];

/* ADDED FIX */
let smartData={};
let smartLoaded=false;

/* FIXED FETCH */
fetch("smart-data.json")
.then(function(response){
return response.json();
})
.then(function(json){

smartData=json;
smartLoaded=true;

console.log("Smart JSON loaded");

})
.catch(function(error){

smartLoaded=false;
console.log("JSON error:", error);

});

/* SMART ANSWER */
function getSmartAnswer(q){

q=q.toLowerCase();

for(let topic in smartData){

if(q.includes(topic)){

let item=smartData[topic];

if(q.includes("founder")) return item.founder;
if(q.includes("create date")||q.includes("created")) return item.create_date;

return item.about;

}

}

return data[q]||"Answer not found";

}

/* FIXED SEARCH */
function search(){

if(!smartLoaded){

document.getElementById("answer").innerText="Loading data please wait 2 seconds";

goPage(3);

return;

}

let q=document.getElementById("query").value.toLowerCase();

if(q==="") return;

selectedQuestion=q;

historyList.unshift(q);

saveHistory();

document.getElementById("answer").innerText=getSmartAnswer(q);

goPage(3);

}

/* ORIGINAL FUNCTIONS */
function goPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById("page"+n).classList.add("show");
}

function goBack(){
goPage(2);
}

function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display=m.style.display==="block"?"none":"block";
}

function toggleMode(){
document.body.classList.toggle("light");
}

function openHistory(){
document.getElementById("historyPage").style.display="block";
}

function closeHistory(){
document.getElementById("historyPage").style.display="none";
}

function saveHistory(){
localStorage.setItem("m_history",JSON.stringify(historyList));
}

function clearHistory(){
historyList=[];
saveHistory();
}

setTimeout(()=>{
document.getElementById("splash").style.display="none";
},2000);

</script>

</body>
  </html>
