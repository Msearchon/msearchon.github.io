<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Professional Engine</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* 1. LOGIN SCREEN */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 350px; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        .auth-card button { width: 100%; padding: 12px; background: var(--blue); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }

        /* 2. BAN SCREEN (Professional) */
        #banScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff4444; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 10000; }
        .ban-box { border: 2px solid #ff4444; padding: 40px; border-radius: 20px; background: #110000; }

        /* 3. MAIN UI */
        #mainApp { display: none; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid #333; }
        .search-area { text-align: center; margin-top: 100px; }
        .search-input { width: 80%; max-width: 500px; padding: 15px 25px; border-radius: 30px; border: 1px solid #5f6368; background: #202124; color: white; outline: none; font-size: 16px; }

        /* PROFILE SIDE MENU */
        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card); border-left: 1px solid #333; z-index: 1001; transition: 0.3s; padding: 20px; }
        #sideMenu.active { right: 0; }
        .p-img { width: 60px; height: 60px; background: var(--blue); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 25px; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div id="banScreen">
        <div class="ban-box">
            <h1 style="margin:0;">ACCESS REVOKED</h1>
            <p style="color:white; margin: 20px 0;">M BOT has BANNED your device/ID.</p>
            <button onclick="localStorage.clear(); location.reload();" style="background:#333; color:white; border:none; padding:10px; cursor:pointer; border-radius:5px;">Logout & Switch Account</button>
        </div>
    </div>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="color:var(--blue);">M-Search Register</h2>
            <input type="text" id="uName" placeholder="Full Name">
            <input type="email" id="uEmail" placeholder="Official Gmail (name@gmail.com)">
            <button onclick="register()">ENTER SYSTEM</button>
            <p id="err" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div style="font-weight:bold; color:var(--blue); font-size:20px;">M-Search</div>
            <div onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">&#9776;</div>
        </header>

        <div class="search-area">
            <h1 style="color:#4285F4; font-size: 50px;">M</h1>
            <input type="text" class="search-input" placeholder="Search with M-ID verification...">
        </div>

        <div id="sideMenu">
            <div style="text-align:right; cursor:pointer; font-size:30px;" onclick="toggleMenu()">&times;</div>
            <div class="p-img" id="pLetter">U</div>
            <div style="text-align:center;">
                <b id="pName" style="color:var(--blue);">User</b><br>
                <span id="pEmail" style="font-size:12px; color:gray;">email@gmail.com</span><br><br>
                <span style="color:yellow; font-size:10px;">ID: <span id="pID"></span></span>
            </div>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <div onclick="localStorage.clear(); location.reload();" style="cursor:pointer; color:gray;">Sign Out</div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY",
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "m-bot-server"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // HAR WAQT CHECK KARNE WALA SYSTEM
        window.onload = () => {
            const m_id = localStorage.getItem("m_id");
            if(m_id) {
                monitorAccount(m_id);
            }
        };

        function register() {
            const name = document.getElementById("uName").value.trim();
            const email = document.getElementById("uEmail").value.trim();
            
            if(!name || !email.includes("@gmail.com")) {
                document.getElementById("err").innerText = "Asali Gmail ID zaroori hai!";
                return;
            }

            const id = "M-" + Math.floor(1000 + Math.random() * 9000);
            db.ref('users/' + id).set({
                name: name,
                email: email,
                status: "Active",
                mID: id
            }).then(() => {
                localStorage.setItem("m_id", id);
                monitorAccount(id);
            });
        }

        // YEH HAI ASALI "BAN MONITOR"
        function monitorAccount(id) {
            // '.on' lagane se database se live connection ban jata hai
            db.ref('users/' + id).on('value', (snap) => {
                const user = snap.val();
                if(!user) return;

                if(user.status === "Banned") {
                    // Agar status 'Banned' hua, toh engine turant gayab
                    document.getElementById("mainApp").style.display = "none";
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("banScreen").style.display = "flex";
                } else {
                    // Agar Active hai, toh app dikhao
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("mainApp").style.display = "block";
                    
                    // Profile Update
                    document.getElementById("pName").innerText = user.name;
                    document.getElementById("pEmail").innerText = user.email;
                    document.getElementById("pID").innerText = user.mID;
                    document.getElementById("pLetter").innerText = user.name[0].toUpperCase();
                }
            });
        }

        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("active");
        }
    </script>
</body>
</html>
