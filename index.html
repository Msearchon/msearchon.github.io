<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Professional Engine</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* LOGIN OVERLAY (Initially Hidden) */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 350px; }
        .auth-card input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        .auth-card button { width: 95%; padding: 12px; background: var(--blue); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }

        /* BAN SCREEN */
        #banScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff4444; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 10000; }

        /* HEADER & SEARCH */
        header { display: flex; flex-direction: column; align-items: center; padding: 20px; border-bottom: 1px solid #333; }
        .logo { font-size: 30px; font-weight: bold; color: #4285F4; margin-bottom: 15px; cursor: pointer; }
        .logo span { color: white; }
        .search-box { width: 90%; max-width: 600px; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 14px 25px; border-radius: 30px; border: 1px solid #5f6368; background: #202124; color: white; outline: none; }

        /* TABS */
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 15px; border-bottom: 1px solid #333; font-size: 14px; color: #9aa0a6; }
        .tab { cursor: pointer; padding-bottom: 5px; }
        .tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }

        /* RESULTS */
        main { padding: 20px 10%; }
        .res-item { margin-bottom: 30px; }
        .res-title { font-size: 20px; color: var(--blue); text-decoration: none; }
        .res-snippet { font-size: 14px; color: #bdc1c6; margin-top: 5px; }

        /* PROFILE */
        #profileIcon { position: fixed; top: 20px; right: 20px; cursor: pointer; background: var(--blue); color: black; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="banScreen">
        <h1>ACCESS DENIED</h1>
        <p>Your Gmail ID is BANNED by CEO Hasan.</p>
        <button onclick="localStorage.clear(); location.reload();" style="color:white; background:#333; border:none; padding:10px 20px; cursor:pointer;">Switch Account</button>
    </div>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="color:var(--blue);">Sign in to Continue</h2>
            <p style="color:gray; font-size:12px;">You've reached your free search limit.</p>
            <input type="text" id="uName" placeholder="Full Name">
            <input type="email" id="uEmail" placeholder="name@gmail.com">
            <button onclick="mRegister()">Login & Continue</button>
            <p id="loginErr" style="color:red; font-size:11px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="profileIcon" onclick="alert('Logged in as: ' + localStorage.getItem('m_user_email'))">U</div>

    <header>
        <div class="logo" onclick="location.reload()">M <span>Search</span></div>
        <div class="search-box">
            <input type="text" id="qInput" class="search-input" placeholder="Search anything..." onkeypress="if(event.key==='Enter') handleSearch()">
            <button onclick="handleSearch()" style="background:var(--blue); border:none; padding:0 20px; border-radius:25px; cursor:pointer; font-weight:bold;">Search</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active">All</div>
        <div class="tab" onclick="alert('Login to see Images')">Images</div>
        <div class="tab" onclick="alert('Login to see Videos')">Videos</div>
    </div>

    <main id="resultsArea">
        <div style="text-align:center; margin-top:50px; color:gray;">
            <h2>M Search Engine</h2>
            <p>Global indexing for professional results.</p>
        </div>
    </main>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY",
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "m-bot-server"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let searchCount = parseInt(localStorage.getItem("m_search_count") || "0");
        let isLoggedIn = localStorage.getItem("m_user_email") ? true : false;

        window.onload = () => {
            if(isLoggedIn) {
                document.getElementById("profileIcon").style.display = "flex";
                const safeKey = localStorage.getItem("m_user_email").replace(/\./g, ',');
                monitorBan(safeKey);
            }
        };

        function handleSearch() {
            const query = document.getElementById("qInput").value.trim();
            if(!query) return;

            // Agar login nahi hai aur 2 search khatam ho gaye hain
            if(!isLoggedIn && searchCount >= 2) {
                document.getElementById("authOverlay").style.display = "flex";
                return;
            }

            // Search Count badhao agar guest hai
            if(!isLoggedIn) {
                searchCount++;
                localStorage.setItem("m_search_count", searchCount);
            }

            performSearch(query);
        }

        async function performSearch(q) {
            const area = document.getElementById("resultsArea");
            area.innerHTML = "<p>Searching...</p>";

            try {
                const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${q}&format=json&origin=*`);
                const data = await res.json();
                let html = "";
                data.query.search.forEach(item => {
                    html += `<div class="res-item">
                        <a href="https://en.wikipedia.org/wiki/${item.title}" target="_blank" class="res-title">${item.title}</a>
                        <div class="res-snippet">${item.snippet}...</div>
                    </div>`;
                });
                area.innerHTML = html || "<p>No results found.</p>";
            } catch {
                area.innerHTML = "<p>Error loading results.</p>";
            }
        }

        function mRegister() {
            const name = document.getElementById("uName").value.trim();
            const email = document.getElementById("uEmail").value.trim().toLowerCase();

            if(!name || !email.endsWith("@gmail.com")) {
                document.getElementById("loginErr").innerText = "Asali @gmail.com use karein!";
                return;
            }

            const safeKey = email.replace(/\./g, ',');
            db.ref('users/' + safeKey).once('value').then(snap => {
                const user = snap.val();
                if(user && user.status === "Banned") {
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("banScreen").style.display = "flex";
                } else {
                    if(!user) {
                        db.ref('users/' + safeKey).set({ name, email, status: "Active" });
                    }
                    localStorage.setItem("m_user_email", email);
                    location.reload();
                }
            });
        }

        function monitorBan(key) {
            db.ref('users/' + key).on('value', snap => {
                if(snap.val() && snap.val().status === "Banned") {
                    document.getElementById("banScreen").style.display = "flex";
                    document.getElementById("authOverlay").style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
