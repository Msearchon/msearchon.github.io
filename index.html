<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Professional Engine</title>
    
    <link rel="icon" type="image/png" href="https://via.placeholder.com/32/4285F4/FFFFFF?text=M">

    <style>
        :root {
            --bing-blue: #0078d4;
            --bg-dark: #0f0f0f;
            --card-bg: #1b1b1b;
            --text-main: #e8eaed;
            --text-dim: #9aa0a6;
            --link-color: #8ab4f8;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
        }

        /* Header & Search Bar */
        header {
            display: flex;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid #333;
            background: var(--bg-dark);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            margin-right: 30px;
            cursor: pointer;
        }

        .logo-m {
            font-size: 32px;
            font-weight: bold;
            color: var(--bing-blue);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 500;
            color: white;
            margin-left: 8px;
            white-space: nowrap;
        }

        .search-box {
            flex: 1;
            max-width: 650px;
        }

        .search-input {
            width: 100%;
            height: 45px;
            border-radius: 24px;
            border: 1px solid #5f6368;
            background: #202124;
            color: white;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            background: #303134;
            border-color: transparent;
            box-shadow: 0 1px 6px rgba(0,0,0,0.4);
        }

        /* Results Layout */
        main {
            padding: 30px 5% 40px 180px;
            max-width: 950px;
        }

        .result-item {
            margin-bottom: 30px;
            animation: fadeIn 0.3s ease-in;
        }

        .result-url {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 4px;
            display: block;
        }

        .result-title {
            font-size: 20px;
            color: var(--link-color);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 5px;
        }

        .result-title:hover { text-decoration: underline; }

        .result-snippet {
            font-size: 14px;
            color: #bdc1c6;
            line-height: 1.5;
        }

        /* Featured Box */
        .featured-box {
            background: var(--card-bg);
            border: 1px solid #3c4043;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 35px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile View */
        @media (max-width: 850px) {
            header { flex-direction: column; padding: 15px; }
            .logo-container { margin-bottom: 15px; margin-right: 0; }
            main { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href=window.location.pathname">
            <span class="logo-m">M</span>
            <span class="logo-text">Search</span>
        </div>
        <div class="search-box">
            <form onsubmit="event.preventDefault(); startProfessionalSearch();">
                <input id="qInput" type="text" class="search-input" placeholder="Search with M Search...">
            </form>
        </div>
    </header>

    <main id="resultsArea">
        <div style="text-align:center; margin-top:100px;">
            <h1 style="font-size:65px; color:var(--bing-blue); margin:0;">M Search</h1>
            <p style="color:var(--text-dim); font-size:18px;">Fast. Private. Professional.</p>
        </div>
    </main>

    <script>
        function updateAddressBar(query) {
            const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?q=' + encodeURIComponent(query);
            window.history.pushState({path:newurl}, '', newurl);
        }

        async function startProfessionalSearch() {
            const query = document.getElementById("qInput").value.trim();
            if(!query) return;

            updateAddressBar(query);
            const resultsArea = document.getElementById("resultsArea");
            resultsArea.innerHTML = "<p style='color:#9aa0a6;'>Searching database...</p>";

            try {
                // Fetching from DuckDuckGo (Bing Mirror) and Wikipedia
                const ddgUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&origin=*`;
                const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;

                const [ddgRes, wikiRes] = await Promise.all([
                    fetch(ddgUrl).then(r => r.json()),
                    fetch(wikiUrl).then(r => r.json())
                ]);

                let html = "";

                // FEATURED RESULT (Quick Answer)
                if(ddgRes.AbstractText) {
                    html += `
                    <div class="featured-box">
                        <div style="color:var(--text-dim); font-size:11px; font-weight:bold; margin-bottom:8px; text-transform:uppercase;">Quick Summary</div>
                        <h2 style="margin:0 0 10px 0; color:#fff;">${ddgRes.Heading}</h2>
                        <p class="result-snippet" style="font-size:15px;">${ddgRes.AbstractText}</p>
                        <a href="${ddgRes.AbstractURL}" target="_blank" style="color:var(--link-color); font-size:13px; text-decoration:none;">Source: ${ddgRes.AbstractSource}</a>
                    </div>`;
                }

                // WEB RESULTS (Wikipedia)
                if(wikiRes.query && wikiRes.query.search.length > 0) {
                    wikiRes.query.search.forEach(item => {
                        html += `
                        <div class="result-item">
                            <span class="result-url">https://en.wikipedia.org › wiki › ${item.title.replace(/ /g, '_')}</span>
                            <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(item.title)}" target="_blank" class="result-title">${item.title}</a>
                            <p class="result-snippet">${item.snippet}...</p>
                        </div>`;
                    });
                }

                // BING EXTERNAL LINK
                html += `
                <div style="margin-top:50px; padding:20px; border-top:1px solid #333; text-align:center;">
                    <a href="https://www.bing.com/search?q=${encodeURIComponent(query)}" target="_blank" 
                       style="background:var(--bing-blue); color:white; padding:10px 25px; border-radius:24px; text-decoration:none; font-weight:bold; font-size:14px;">
                       See more web results on Bing
                    </a>
                </div>`;

                resultsArea.innerHTML = html;

            } catch (err) {
                resultsArea.innerHTML = "<p>Connection error. Please try again.</p>";
            }
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                document.getElementById("qInput").value = q;
                startProfessionalSearch();
            }
        };
    </script>
</body>
</html>
