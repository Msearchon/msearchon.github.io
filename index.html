<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Search - Verified Engine</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; --green: #34a853; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* AUTH SCREEN */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        .auth-card button { width: 100%; padding: 12px; background: var(--blue); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }

        /* BAN SCREEN */
        #banScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff4444; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 10000; }
        
        /* MAIN APP UI */
        #mainApp { display: none; }
        header { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .logo { font-size: 35px; font-weight: bold; color: #4285F4; margin-bottom: 20px; }
        .logo span { color: white; }
        .search-container { width: 90%; max-width: 600px; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 14px 25px; border-radius: 30px; border: 1px solid #5f6368; background: #202124; color: white; outline: none; font-size: 16px; }
        
        /* PROFILE MENU */
        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card); border-left: 1px solid #333; z-index: 1001; transition: 0.3s; padding: 25px; }
        #sideMenu.active { right: 0; }
        .profile-pic { width: 70px; height: 70px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: black; margin: 0 auto 15px; font-weight: bold; }
        
        #results { padding: 20px 10%; margin-top: 20px; }
        .result-item { margin-bottom: 25px; animation: fadeIn 0.5s; }
        .result-item a { color: var(--blue); font-size: 18px; text-decoration: none; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="banScreen">
        <div style="border: 2px solid #ff4444; padding: 40px; border-radius: 20px; background: #110000;">
            <h1>ACCESS DENIED</h1>
            <p style="color:white;">Your Gmail has been permanently BANNED by CEO Hasan.</p>
            <button onclick="localStorage.clear(); location.reload();" style="padding:10px; cursor:pointer; background:#333; border:none; color:white; border-radius:5px;">Switch Account</button>
        </div>
    </div>

    <div id="authOverlay">
        <div class="auth-card">
            <h1 style="color:var(--blue);">M Search</h1>
            <p style="color:gray; font-size:12px;">Login with Official Gmail</p>
            <input type="text" id="uName" placeholder="Full Name">
            <input type="email" id="uEmail" placeholder="example@gmail.com">
            <button onclick="mRegister()">ENTER ENGINE</button>
            <p id="err" style="color:red; font-size:11px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div style="width:100%; display:flex; justify-content:flex-end;">
                <div onclick="toggleMenu()" style="cursor:pointer; font-size:28px;">&#9776;</div>
            </div>
            <div class="logo">M <span>Search</span></div>
            <div class="search-container">
                <input type="text" id="qInput" class="search-input" placeholder="Search globally..." onkeypress="if(event.key==='Enter') startSearch()">
                <button onclick="startSearch()" style="background:var(--blue); border:none; padding:0 20px; border-radius:25px; cursor:pointer; font-weight:bold;">Search</button>
            </div>
        </header>

        <div id="results">
            </div>

        <div id="sideMenu">
            <div style="text-align:right; font-size:30px; cursor:pointer;" onclick="toggleMenu()">&times;</div>
            <div class="profile-pic" id="pLetter">U</div>
            <div style="text-align:center;">
                <b id="pName" style="font-size:20px;">User Name</b><br>
                <span id="pEmail" style="font-size:12px; color:gray;">email@gmail.com</span><br>
                <p style="color:yellow; font-size:10px; margin-top:15px;">M-ID: <span id="pID"></span></p>
            </div>
            <hr style="border:0; border-top:1px solid #333; margin:25px 0;">
            <div onclick="localStorage.clear(); location.reload();" style="color:gray; cursor:pointer;">Logout</div>
        </div>
    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCtaYOmvdfYCR6xl_T6538v-8H-pLNoXyY",
            databaseURL: "https://m-bot-server-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "m-bot-server"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Check if already logged in
        window.onload = () => {
            const savedEmail = localStorage.getItem("m_user_email");
            if (savedEmail) {
                // Email se special ID banana (Dots bypass karne ke liye)
                const safeKey = savedEmail.replace(/\./g, ',');
                monitorBan(safeKey);
            }
        };

        // 2. Register with Gmail as ID
        function mRegister() {
            const name = document.getElementById("uName").value.trim();
            const email = document.getElementById("uEmail").value.trim().toLowerCase();
            const err = document.getElementById("err");

            if(!name || !email.endsWith("@gmail.com")) {
                err.innerText = "Error: Please use an active @gmail.com address!";
                return;
            }

            const safeKey = email.replace(/\./g, ','); // Firebase keys mein dots allow nahi hote

            // Check if user already exists
            db.ref('users/' + safeKey).once('value').then(snap => {
                if(snap.exists()) {
                    localStorage.setItem("m_user_email", email);
                    monitorBan(safeKey);
                } else {
                    db.ref('users/' + safeKey).set({
                        name: name,
                        email: email,
                        status: "Active",
                        mID: "M-" + Math.floor(Math.random()*999)
                    }).then(() => {
                        localStorage.setItem("m_user_email", email);
                        monitorBan(safeKey);
                    });
                }
            });
        }

        // 3. Monitor Ban in Real-Time
        function monitorBan(key) {
            db.ref('users/' + key).on('value', (snap) => {
                const user = snap.val();
                if(!user) return;

                if(user.status === "Banned") {
                    document.getElementById("mainApp").style.display = "none";
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("banScreen").style.display = "flex";
                } else {
                    document.getElementById("authOverlay").style.display = "none";
                    document.getElementById("mainApp").style.display = "block";
                    document.getElementById("pName").innerText = user.name;
                    document.getElementById("pEmail").innerText = user.email;
                    document.getElementById("pID").innerText = user.mID;
                    document.getElementById("pLetter").innerText = user.name[0].toUpperCase();
                }
            });
        }

        // 4. Search Functionality (Integrated from Original)
        async function startSearch() {
            const q = document.getElementById("qInput").value.trim();
            if(!q) return;

            const resDiv = document.getElementById("results");
            resDiv.innerHTML = "<p style='color:gray;'>Searching Global Index...</p>";

            try {
                const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${q}&format=json&origin=*`);
                const data = await response.json();
                let html = `<h3>Results for: ${q}</h3>`;
                data.query.search.forEach(item => {
                    html += `
                        <div class="result-item">
                            <a href="https://en.wikipedia.org/wiki/${item.title}" target="_blank">${item.title}</a>
                            <p style="color:#bdc1c6; font-size:14px;">${item.snippet}...</p>
                        </div>`;
                });
                resDiv.innerHTML = html;
            } catch {
                resDiv.innerHTML = "<p style='color:red;'>System Busy. Please try again.</p>";
            }
        }

        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("active");
        }
    </script>
</body>
</html>
