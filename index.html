<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>M Search - Professional Knowledge Engine</title>
    <meta name="description" content="M Search: A professional web portal for Global Web Results, Images, and Videos.">
    <meta name="author" content="Mehdi Hasan / MGPLC">

    <style>
        /* AAPKA EXACT ORIGINAL UI SYSTEM */
        :root { --blue: #8ab4f8; --bg: #0f0f0f; --text: #e8eaed; --card: #1f1f1f; --green: #34a853; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.3s; }
        
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5%;
        }

        .search-container-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }

        .search-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .search-bar {
            background: #202124;
            border: 1px solid #3c4043;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            height: 46px;
            transition: 0.2s;
        }

        .search-bar:focus-within {
            background: #303134;
            box-shadow: 0 1px 6px rgba(0,0,0,0.3);
            border-color: transparent;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }

        .menu-lines {
            cursor: pointer;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-lines div {
            width: 25px;
            height: 3px;
            background: var(--blue);
            border-radius: 2px;
        }

        /* Side Menu Style */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: #171717;
            z-index: 1000;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            border-right: 1px solid #333;
        }

        .side-menu.active { left: 0; }

        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ccc;
            transition: 0.2s;
        }

        .menu-item:hover { background: #252525; color: var(--blue); }

        .pane { display: none; margin-top: 20px; }
        .history-entry { padding: 10px; background: #222; margin-bottom: 5px; border-radius: 8px; cursor: pointer; }
        textarea { width: 100%; height: 200px; background: #222; color: white; border: 1px solid #333; padding: 10px; border-radius: 10px; }

        #mainLinks { margin-top: 40px; }
    </style>
</head>
<body>

    <div id="sideMenu" class="side-menu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; color:var(--blue);">M Menu</h2>
            <span style="cursor:pointer; font-size:24px;" onclick="closeMenu()">×</span>
        </div>

        <div class="menu-item" onclick="goToSearchX()">
            <span style="font-size:18px;">🚀</span> <b>SearchX System</b>
        </div>

        <div class="menu-item" onclick="openPane('history')"><span>📜</span> History</div>
        <div class="menu-item" onclick="openPane('notes')"><span>📝</span> Quick Notes</div>
        <div class="menu-item" onclick="resetUI()"><span>🏠</span> Home</div>

        <div id="historyPane" class="pane">
            <h3>Recent Search</h3>
            <div id="historyList"></div>
            <button onclick="clearHistory()" style="width:100%; margin-top:10px; padding:8px; background:#444; border:none; color:white; border-radius:5px;">Clear All</button>
        </div>

        <div id="notesPane" class="pane">
            <h3>Quick Notes</h3>
            <textarea id="noteArea" placeholder="Write something..." oninput="saveNote()"></textarea>
        </div>
    </div>

    <header>
        <div style="font-size:32px; font-weight:bold; color:var(--blue); margin-bottom:20px;">M SEARCH</div>
        <div class="search-container-row">
            <div class="menu-lines" onclick="openMenu()">
                <div></div><div></div><div></div>
            </div>
            <div class="search-wrapper">
                <div class="search-bar">
                    <input type="text" id="qInput" placeholder="Search the web..." onkeydown="if(event.key==='Enter') handleGlobalSearch()">
                    <span onclick="handleGlobalSearch()" style="cursor:pointer; color:var(--blue);">🔍</span>
                </div>
            </div>
        </div>
    </header>

    <div id="mainLinks" class="container" style="text-align:center; padding:50px;">
        <p style="opacity:0.6;">Welcome to the next generation of knowledge retrieval.</p>
    </div>

    <script>
        // REDIRECT TO SEARCHX
        function goToSearchX() {
            closeMenu();
            // User ki uploaded file SearchX.html ko target kiya gaya hai
            window.location.href = "SearchX.html";
        }

        // Sidebar Logic
        function openMenu() { document.getElementById("sideMenu").classList.add("active"); updateHistoryList(); }
        function closeMenu() { document.getElementById("sideMenu").classList.remove("active"); }

        function openPane(pName) {
            document.querySelectorAll(".pane").forEach(p => p.style.display = "none");
            document.getElementById(pName + "Pane").style.display = "block";
            document.getElementById("mainLinks").style.display = "none";
        }

        function handleGlobalSearch() {
            const q = document.getElementById("qInput").value.trim();
            if(!q) return;
            saveToHistory(q);
            window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
        }

        function resetUI() {
            document.getElementById("mainLinks").style.display = "block";
            document.querySelectorAll(".pane").forEach(p => p.style.display = "none");
            closeMenu();
        }

        function saveToHistory(q) {
            let h = JSON.parse(localStorage.getItem("mHist") || "[]");
            h = h.filter(x => x !== q); h.unshift(q);
            localStorage.setItem("mHist", JSON.stringify(h.slice(0, 15)));
        }

        function updateHistoryList() {
            const list = document.getElementById("historyList");
            const h = JSON.parse(localStorage.getItem("mHist") || "[]");
            list.innerHTML = h.length ? "" : "<p style='opacity:0.5; text-align:center;'>History is empty</p>";
            h.forEach(q => {
                const d = document.createElement("div"); d.className = "history-entry"; d.innerText = q;
                d.onclick = () => { document.getElementById("qInput").value = q; handleGlobalSearch(); closeMenu(); };
                list.appendChild(d);
            });
        }

        function clearHistory() { localStorage.removeItem("mHist"); updateHistoryList(); }
        function saveNote() { localStorage.setItem("mNote", document.getElementById("noteArea").value); }

        window.onload = () => {
            const note = localStorage.getItem("mNote");
            if(note) document.getElementById("noteArea").value = note;
        };
    </script>
</body>
</html>
